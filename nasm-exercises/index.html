<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NASM Exercise Library</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#20243a;
  --accent:#e85d26;--accent2:#f7941d;
  --text:#e8eaf0;--muted:#8b90a8;--border:#2e3250;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:16px;flex-shrink:0;overflow-y:auto;position:sticky;top:0;height:100vh}
.main{flex:1;padding:20px;overflow:auto}
.logo{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:2px}
.logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:.72rem;color:var(--muted);margin-bottom:18px}
.search input{width:100%;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9rem;outline:none;margin-bottom:16px;transition:border-color .2s}
.search input:focus{border-color:var(--accent)}
.filter-section{margin-bottom:14px}
.filter-label{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.filter-list{display:flex;flex-direction:column;gap:3px;max-height:180px;overflow-y:auto}
.filter-list label{display:flex;align-items:center;gap:7px;font-size:.8rem;cursor:pointer;padding:3px 4px;border-radius:5px;color:var(--muted);transition:all .15s}
.filter-list label:hover{color:var(--text);background:rgba(255,255,255,.04)}
.filter-list input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;flex-shrink:0}
.count{margin-left:auto;font-size:.68rem;background:var(--border);border-radius:10px;padding:1px 6px;color:var(--muted)}
.clear{width:100%;margin-top:14px;padding:7px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;cursor:pointer;font-size:.78rem;transition:all .2s}
.clear:hover{border-color:var(--accent);color:var(--accent)}
.header{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.header h1{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.count-display{font-size:.8rem;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;position:relative}
.card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 8px 24px rgba(232,93,38,.15)}
.card-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--surface);display:block}
.card-placeholder{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#1e2238,#252a42);display:flex;align-items:center;justify-content:center;font-size:2rem}
.card-body{padding:11px}
.card-title{font-weight:600;font-size:.88rem;margin-bottom:7px;line-height:1.3}
.tags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:.65rem;padding:2px 7px;border-radius:20px;border:1px solid;white-space:nowrap}
.tag-eq{background:rgba(232,93,38,.12);color:var(--accent2);border-color:rgba(232,93,38,.22)}
.tag-bp{background:rgba(74,120,238,.12);color:#7ba4ff;border-color:rgba(74,120,238,.22)}
.tag-diff{border:none;font-weight:600;font-size:.62rem;padding:2px 7px;border-radius:20px}
.tag-diff.Beginner{background:rgba(58,125,68,.2);color:#6bbf7a}
.tag-diff.Intermediate{background:rgba(180,83,9,.2);color:#f59e0b}
.tag-diff.Advanced{background:rgba(155,28,28,.2);color:#f87171}
.vid-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:.65rem;padding-left:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 22px 0;display:flex;justify-content:space-between;align-items:start;gap:12px}
.modal-title{font-size:1.25rem;font-weight:700;line-height:1.3}
.modal-close{background:var(--card);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.modal-body{padding:14px 22px 22px}
.modal-img{width:100%;max-height:300px;object-fit:contain;background:var(--card);border-radius:9px;margin-bottom:14px}
.meta-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.meta-chip{background:var(--card);border-radius:7px;padding:8px 13px;flex:1;min-width:150px}
.meta-chip h4{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px}
.meta-chip p{font-size:.82rem}
.steps-title{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:14px 0 8px}
.steps{padding-left:18px}
.steps li{font-size:.85rem;line-height:1.65;color:var(--text);margin-bottom:7px}
.steps li::marker{color:var(--accent)}
.modal-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.modal-link{display:inline-flex;align-items:center;gap:6px;color:var(--accent2);font-size:.82rem;border:1px solid var(--border);border-radius:7px;padding:7px 13px;transition:border-color .2s;text-decoration:none}
.modal-link:hover{border-color:var(--accent2)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo">NASM <span>Exercise Library</span></div>
  <div class="sub">75 exercises &middot; offline viewer</div>
  <div class="search"><input id="q" type="text" placeholder="Search&hellip;" autocomplete="off"></div>
  <div class="filter-section">
    <div class="filter-label">Difficulty</div>
    <div class="filter-list" id="fDiff"></div>
  </div>
  <div class="filter-section">
    <div class="filter-label">Body Part / Muscle</div>
    <div class="filter-list" id="fBody"></div>
  </div>
  <div class="filter-section">
    <div class="filter-label">Equipment</div>
    <div class="filter-list" id="fEquip"></div>
  </div>
  <div class="filter-section">
    <div class="filter-label">Media</div>
    <div class="filter-list">
      <label><input type="checkbox" id="chkVideo"> Has video</label>
      <label><input type="checkbox" id="chkImg"> Has image</label>
    </div>
  </div>
  <button class="clear" onclick="clearAll()">Clear all filters</button>
</aside>
<main class="main">
  <div class="header">
    <h1>Exercise Library</h1>
    <span class="count-display" id="countEl"></span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">No exercises match your filters.</div>
</main>
</div>
<div class="modal-overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="mTitle"></div>
      <button class="modal-close" onclick="closeModalDirect()">&#x2715;</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>
<script>
const EX = [{"id":1,"slug":"barbell-deadlift","url":"https://www.nasm.org/resource-center/exercise-library/barbell-deadlift","title":"Barbell Deadlift","difficulty":"Intermediate","equipment":["Barbell"],"bodyParts":["Quadriceps","Glutes","Hamstrings","Groin"],"videoUrl":"https://www.youtube.com/watch?v=Z6gcRfPNcZo","thumbnailUrl":"https://img.youtube.com/vi/Z6gcRfPNcZo/hqdefault.jpg","localImage":"images/barbell-deadlift.jpg","steps":["Stand in athletic posture with feet hip to shoulder width apart and toes pointing forward. Hinge at the hips and slightly bend the knees to grab onto the barbell with hands slightly wider than shins. Brace the abs and position the bar over midfoot.","With the back flat and bar close to the shins and thigh, push into the floor to lift the bar. Maintain the head and torso angle until the bar passes the knees then stand upright.","Reverse the pattern, hinging at the hips to initiate, to return the bar to its starting position.","Repeat for the desired number of repetitions. Avoid rounding the spine, over emphasizing the knee bend, losing head position or rounding the shoulders."]},{"id":2,"slug":"kettlebell-deadlift","url":"https://www.nasm.org/resource-center/exercise-library/kettlebell-deadlift","title":"Kettlebell Deadlift","difficulty":"Beginner","equipment":["Kettlebell"],"bodyParts":["Quadriceps","Hamstrings","Groin","Glutes"],"videoUrl":"https://www.youtube.com/watch?v=LnIMaf-XOpM","thumbnailUrl":"https://img.youtube.com/vi/LnIMaf-XOpM/hqdefault.jpg","localImage":"images/kettlebell-deadlift.jpg","steps":["Stand in athletic posture with feet hip to shoulder width apart and toes pointing forward. Hinge at the hips and bend the knees to grab onto the kettlebell which is positioned between the midfeet. Brace the abs.","With the back flat and chin tucked, push into the floor to lift the kettlebell until the body is full upright.","Reverse the pattern, hinging at the hips to initiate, to return the bell to its starting position.","Repeat for the desired number of repetitions. Avoid rounding the spine, losing head position, letting the knees collapse inward or rounding the shoulders."]},{"id":3,"slug":"dumbbell-romanian-deadlift","url":"https://www.nasm.org/resource-center/exercise-library/dumbbell-romanian-deadlift","title":"Dumbbell Romanian Deadlift","difficulty":"Intermediate","equipment":["Dumbbells"],"bodyParts":["Hamstrings","Groin","Glutes"],"videoUrl":"https://www.youtube.com/watch?v=V8Hdl1FiNt4","thumbnailUrl":"https://img.youtube.com/vi/V8Hdl1FiNt4/hqdefault.jpg","localImage":"images/dumbbell-romanian-deadlift.jpg","steps":["Stand in athletic posture with your feet hip to shoulder width, toes pointing straight ahead and knees unlocked. Hinge at the hips and bend the knees to grab onto the dumbbells and stand. Brace the abs and lock the shoulder blades back and down.","Hold the dumbbells in front of your thighs. Hinge at the hips and lower the dumbbells through a maximum range that you can maintain good posture. Keep the back flat and dumbbells close to the body at all times.","Reverse the pattern pushing the hips forward to return to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid locking knees, slouching or over arching the lower and upper back. Keep the head in line with the back at all times."]},{"id":4,"slug":"lying-leg-curl","url":"https://www.nasm.org/resource-center/exercise-library/lying-leg-curl","title":"Lying Leg Curl","difficulty":"Beginner","equipment":["Lying Leg Curl Machine"],"bodyParts":["Hamstrings","Calves"],"videoUrl":"https://www.youtube.com/watch?v=Dq5y4WEcqqo","thumbnailUrl":"https://img.youtube.com/vi/Dq5y4WEcqqo/hqdefault.jpg","localImage":"images/lying-leg-curl.jpg","steps":["Lie face down on the leg curl machine with feet hip width apart, abs drawn in and braced and glutes flexed. Ensure setup positions knee close to hinge on the machine and pad resting on lower calf/achilles. Position head in line with the back and lock shoulder blades back and down.","Pull toes toward the knees then drive the heels up toward the glutes as far as possible without arching the lower back or lifting the hips off of the pad.","Reverse the pattern and lower the weight back to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid overarching the lower back, pointing or turning the toes out or letting the head fall toward the pad."]},{"id":5,"slug":"barbell-bicep-curl","url":"https://www.nasm.org/resource-center/exercise-library/barbell-bicep-curl","title":"Barbell Bicep Curl","difficulty":"Beginner","equipment":["Barbell"],"bodyParts":["Biceps"],"videoUrl":"https://www.youtube.com/watch?v=pQfJR-sSIvA","thumbnailUrl":"https://img.youtube.com/vi/pQfJR-sSIvA/hqdefault.jpg","localImage":"images/barbell-bicep-curl.jpg","steps":["Stand in athletic posture with feet hip to shoulder width apart, toes pointing forward and abs braced. Place arms comfortably at your side and then grip the bar width hands at that width, palms forward. Keep the head in line with the back and lock the shoulder blades back and down.","Curl the barbell forward, up and in toward the chest through a maximum range the does not allow the elbows to swing forward.","Reverse the movement to return to the start position. Maintain posture throughout.","Repeat for the desired number of repetitions. Do not allow the shoulders to round, back to arch, chin to jut forward or barbell to swing with momentum."]},{"id":6,"slug":"floor-bridge","url":"https://www.nasm.org/resource-center/exercise-library/floor-bridge","title":"Floor Bridge","difficulty":"Beginner","equipment":["None"],"bodyParts":["Core","Glutes","Groin"],"videoUrl":"https://www.youtube.com/watch?v=Z3cY3d3BBo4","thumbnailUrl":"https://img.youtube.com/vi/Z3cY3d3BBo4/hqdefault.jpg","localImage":"images/floor-bridge.jpg","steps":["Lie supine on the back with the knees bent at 90 and the feet flat hip width apart. Place the arms out to the sides. Draw in the abs.","Bridge the body up into a straight line until glutes are contracted.","Pause and then slowly lower the hips down to the floor. Maintain posture throughout.","Repeat for the desired number of repetitions. Do not arch the back. Keep the ribs down and shoulders blades pinched throughout."]},{"id":7,"slug":"floor-prone-cobra","url":"https://www.nasm.org/resource-center/exercise-library/floor-prone-cobra","title":"Floor Prone Cobra","difficulty":"Beginner","equipment":["None"],"bodyParts":["Upper Back","Shoulders"],"videoUrl":"https://www.youtube.com/watch?v=keErJXdp2lE","thumbnailUrl":"https://img.youtube.com/vi/keErJXdp2lE/hqdefault.jpg","localImage":"images/floor-prone-cobra.jpg","steps":["Lie face down on the floor with the arms down at the sides in an \"A\" position. Ensure body is in a straight line with toes pointing straight ahead to the floor, eyes straight down, glutes flexed, and belly is drawn in.","Pull the body into a straight line bringing the head off the ground and extending the upper back. Pull the shoulder blades back and down, then reach your thumbs toward the sky while keeping elbows straight.","Reverse the pattern and return to starting position.","Repeat for the desired number of repetitions. Maintain proper posture not allowing the lower back to excessively arch, head to fall toward the floor, or shoulders to round forward."]},{"id":8,"slug":"good-mornings","url":"https://www.nasm.org/resource-center/exercise-library/good-mornings","title":"Good Mornings","difficulty":"Intermediate","equipment":["Barbell"],"bodyParts":["Hamstrings","Groin","Glutes"],"videoUrl":"https://www.youtube.com/watch?v=Daq-wJMUnes","thumbnailUrl":"https://img.youtube.com/vi/Daq-wJMUnes/hqdefault.jpg","localImage":"images/good-mornings.jpg","steps":["Stand in athletic posture with your feet hip to shoulder width, toes pointing straight ahead and knees unlocked.","Rack barbell across the upper back and maintain a slightly wider than shoulder width grip on the bar. Brace the abs and lock the shoulder blades back and down.","Hinge at the hips and descend through a maximum range that you can maintain good posture. Keep the back flat and core braced at all times.","Reverse the pattern pushing the hips forward to return to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid locking knees, slouching or over arching the lower and upper back. Keep the head in line with the back at all times."]},{"id":9,"slug":"side-plank","url":"https://www.nasm.org/resource-center/exercise-library/side-plank","title":"Side Plank","difficulty":"Beginner","equipment":["None"],"bodyParts":["Abdominals"],"videoUrl":"https://www.youtube.com/watch?v=44ND4bOB-T0","thumbnailUrl":"https://img.youtube.com/vi/44ND4bOB-T0/hqdefault.jpg","localImage":"images/side-plank.jpg","steps":["Lie on your side with the feet stacked, toes pulled toward the nose and forearm on the ground with elbow under the shoulder. Draw in the belly button, brace the abs, and squeeze the glute muscles.","Lift the body off of the floor and form a straight line from head to heel.","Reverse the pattern and return to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions or time. Avoid pointing the toes, shoulder blade collapsing, body twisting or chin jutting forward."]},{"id":10,"slug":"plank","url":"https://www.nasm.org/resource-center/exercise-library/plank","title":"Plank","difficulty":"Beginner","equipment":["None"],"bodyParts":["Abdominals"],"videoUrl":"https://www.youtube.com/watch?v=mwlp75MS6Rg","thumbnailUrl":"https://img.youtube.com/vi/mwlp75MS6Rg/hqdefault.jpg","localImage":"images/plank.jpg","steps":["Lie on the stomach with the feet together and the forearms on the ground with elbows under the shoulders. Draw in the belly button, brace, and squeeze the glute muscles.","Lift the body off of the floor and form a straight line from head to heel.","Return to the starting position.","Repeat for the desired number of repetitions or time. Avoid feet collapsing inward, shoulder blades winging or chin falling toward the floor."]},{"id":11,"slug":"plank-walkup","url":"https://www.nasm.org/resource-center/exercise-library/plank-walkup","title":"Plank Walkup","difficulty":"Intermediate","equipment":["None"],"bodyParts":["Abdominals"],"videoUrl":"https://www.youtube.com/watch?v=6Tv4xTRPtUc","thumbnailUrl":"https://img.youtube.com/vi/6Tv4xTRPtUc/hqdefault.jpg","localImage":"images/plank-walkup.jpg","steps":["Lie on the stomach with the feet together and the forearms on the ground with elbows under the shoulders. Draw in the belly button, brace, and squeeze the glute muscles. Lift the body off of the floor and form a straight line from head to heel.","Next, push up from the ground, one arm at a time, into a push up position.","Reverse the pattern and return to the starting position.","Repeat for the desired number of repetitions or time. Avoid feet collapsing inward, shoulder blades winging or chin falling toward the floor."]},{"id":12,"slug":"straight-arm-plank","url":"https://www.nasm.org/resource-center/exercise-library/straight-arm-plank","title":"Straight-Arm Plank","difficulty":"Beginner","equipment":["None"],"bodyParts":["Abdominals"],"videoUrl":"https://www.youtube.com/watch?v=MDxfAuBbHHA","thumbnailUrl":"https://img.youtube.com/vi/MDxfAuBbHHA/hqdefault.jpg","localImage":"images/straight-arm-plank.jpg","steps":["Position the body on the hands and knees with hands under the shoulders and knees/feet hip to shoulder width apart. Draw in the belly button and brace the abs.","Lift the body off of the floor and form a straight line from head to heel flexing the glutes. Hold.","Return to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions or time. Avoid feet collapsing inward, shoulder blades winging or chin falling toward the floor."]},{"id":13,"slug":"prisoner-squat","url":"https://www.nasm.org/resource-center/exercise-library/prisoner-squat","title":"Prisoner Squat","difficulty":"Beginner","equipment":["None"],"bodyParts":["Thighs","Glutes","Calves"],"videoUrl":"https://www.youtube.com/watch?v=UYbsgiiZgao","thumbnailUrl":"https://img.youtube.com/vi/UYbsgiiZgao/hqdefault.jpg","localImage":"images/prisoner-squat.jpg","steps":["Stand with feet straight and hip-to-shoulder-width apart and fingers interlaced behind your head. Draw in and brace the abs.","Squat down to a maximum range you can maintain posture through, keeping knees in alignment with the toes. Keep chest out, eyes forward and elbows pressed out on the descent.","Reverse the pattern and squeeze glutes pressing through heels to return to start position. Return the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid knees collapsing inward, toes turning out, back slouching or overarching or chin jutting forward."]},{"id":14,"slug":"squat-jump","url":"https://www.nasm.org/resource-center/exercise-library/squat-jump","title":"Squat Jump","difficulty":"Intermediate","equipment":["None"],"bodyParts":["Full Body"],"videoUrl":"https://www.youtube.com/watch?v=tZSYZdtbONc","thumbnailUrl":"https://img.youtube.com/vi/tZSYZdtbONc/hqdefault.jpg","localImage":"images/squat-jump.jpg","steps":["Stand with your feet hip to shoulder width apart and toes pointing straight ahead. Draw in the belly button.","Rapidly descend to a depth that feels explosive (typically around a quarter squat) while pulling the arms back to the side.","Quickly and powerfully reverse the pattern and jump up, raising the arms above the head. Land as quietly as possible and immediately begin the next repetition. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid knees collapsing inward, back arching or slouching, or uncontrolled head movement."]},{"id":15,"slug":"bulgarian-split-squat","url":"https://www.nasm.org/resource-center/exercise-library/bulgarian-split-squat","title":"Bulgarian Split Squat","difficulty":"Intermediate","equipment":["Bench","Dumbbells"],"bodyParts":["Quadriceps","Glutes","Groin"],"videoUrl":"https://www.youtube.com/watch?v=hbw7hdyOpq0","thumbnailUrl":"https://img.youtube.com/vi/hbw7hdyOpq0/hqdefault.jpg","localImage":"images/bulgarian-split-squat.jpg","steps":["Stand with feet hip width apart and approximately 2 shoulder widths in length with shoelaces down on a bench. Set spine in neutral, dumbbells at your sides and core braced.","Drop the trailing knee down until it is 1-2 inches off the ground maintaining a slight forward torso angle. Strive to achieve a 90˚ knee angle or thigh parallel at the bottom of the movement.","Reverse the pattern and return to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions. Ensure knee tracks in line with toes. Avoid lifting the front heel, allowing the knee to collapse inward while lowering. Keep laces flat on the bench (make sure the bench or box is the correct height to allow for this)."]},{"id":16,"slug":"goblet-squat","url":"https://www.nasm.org/resource-center/exercise-library/goblet-squat","title":"Goblet Squat","difficulty":"Beginner","equipment":["Kettlebell"],"bodyParts":["Quadriceps","Groin","Glutes"],"videoUrl":"https://www.youtube.com/watch?v=nfX7IFK9UNI","thumbnailUrl":"https://img.youtube.com/vi/nfX7IFK9UNI/hqdefault.jpg","localImage":"images/goblet-squat.jpg","steps":["Stand in athletic posture with feet hip to shoulder width apart and toes forward. Draw in and brace the abs. Pull the shoulder blades back and down and lock the elbows into the side of the body.","Drive the hips back and squat down to a maximum depth that posture and alignment can be maintained (typically between 90˚ at the knee and thigh parallel to the floor). Keep the weight balanced from heel to ball of foot.","Reverse the pattern and return to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid slouching the back or shoulders, letting the elbows flare out, knees caving in or toes turning out."]},{"id":17,"slug":"dumbbell-front-squat","url":"https://www.nasm.org/resource-center/exercise-library/dumbbell-front-squat","title":"Dumbbell Front Squat","difficulty":"Beginner","equipment":["Dumbbells"],"bodyParts":["Quadriceps","Groin","Glutes"],"videoUrl":"https://www.youtube.com/watch?v=hZI8Yy5elZs","thumbnailUrl":"https://img.youtube.com/vi/hZI8Yy5elZs/hqdefault.jpg","localImage":"images/dumbbell-front-squat.jpg","steps":["Stand in athletic posture with feet hip to shoulder width apart and toes forward. Draw in and brace the abs. Pull the shoulder blades back and down and lock the elbows into the side of the body. Balance the dumbbells above the elbows at all times (or set them on the shoulders).","Drive the hips back and squat down to a maximum depth that posture and alignment can be maintained (typically between 90˚ at the knee and thigh parallel to the floor). Keep the weight balanced from heel to ball of foot and torso fairly upright.","Reverse the pattern and return to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid slouching the back or shoulders, letting the elbows flare out, knees caving in or toes turning out."]},{"id":18,"slug":"squat-thrust-burpees","url":"https://www.nasm.org/resource-center/exercise-library/squat-thrust-burpees","title":"Squat Thrust (Burpees)","difficulty":"Advanced","equipment":["None"],"bodyParts":["Full Body"],"videoUrl":"https://www.youtube.com/watch?v=Ny8JWqh4lNg","thumbnailUrl":"https://img.youtube.com/vi/Ny8JWqh4lNg/hqdefault.jpg","localImage":"images/squat-thrust-burpees.jpg","steps":["Stand in athletic posture with feet hip to shoulder width apart and toes pointing forward. Draw in the abs.","Squat down driving the hips back as far as possible.","Once maximum squat depth has been reached, place the hands on the floor about 1.5-2x shoulder width. Kick the feet out from underneath the body rapidly putting the body into a push up position with the legs extended and toes pointing straight toward the floor.","Perform a push up. Keeping the body in a straight line with glutes tight, lower the chest to the floor moving through a maximum range that technique can be maintained.","Reverse the pattern rapidly extending the arms. Jump the feet back underneath the body to position for a squat jump.","Transition quickly into a jump, swinging the arms up overhead. Land as quietly as possible with toes pointing forward, knees following toes and neutral spine.","Reset and repeat. Maintain posture throughout. Avoid excessive slouching of the shoulders or spine, letting the head jut forward, knees collapse in or toes pointing outward."]},{"id":19,"slug":"kettlebell-front-squat","url":"https://www.nasm.org/resource-center/exercise-library/kettlebell-front-squat","title":"Kettlebell Front Squat","difficulty":"Beginner","equipment":["Kettlebell"],"bodyParts":["Thighs","Quadriceps","Groin","Glutes"],"videoUrl":"https://www.youtube.com/watch?v=-TeEMXoHQPM","thumbnailUrl":"https://img.youtube.com/vi/-TeEMXoHQPM/hqdefault.jpg","localImage":"images/kettlebell-front-squat.jpg","steps":["Stand in athletic posture with feet hip to shoulder width apart and toes forward. Draw in and brace the abs. Pull the shoulder blades back and down and lock the elbows into the side of the body. Hold the kettlebells on the sides of the handles.","Drive the hips back and squat down to a maximum depth that posture and alignment can be maintained (typically between 90˚ at the knee and thigh parallel to the floor). Keep the weight balanced from heel to ball of foot and torso fairly upright.","Reverse the pattern and return to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid slouching the back or shoulders, letting the elbows flare out, knees caving in or toes excessively turning out."]},{"id":20,"slug":"bird-dog","url":"https://www.nasm.org/resource-center/exercise-library/bird-dog","title":"Bird Dog","difficulty":"Beginner","equipment":["None"],"bodyParts":["Core","Erector Spinae","Multifidi"],"videoUrl":"https://www.youtube.com/watch?v=ZdAHe9_HeEw","thumbnailUrl":"https://img.youtube.com/vi/ZdAHe9_HeEw/hqdefault.jpg","localImage":"images/bird-dog.jpg","steps":["Get into quadruped position (on all fours) with the hands under the shoulders and knees under the hips. Press away from the floor with the arms to stabilize shoulder girdle. Draw the abs in. Position spine in neutral.","Slowly reach one arm and the opposite leg with toes pointed away from the body. Reach long for the walls attempting to get the body in a straight line.","Reverse the pattern and return the starting position sweeping the hand and knee into position.","Repeat with the other side. Maintain posture throughout. Avoid letting the head fall to the ground, back arch or slouch, shoulder collapse or torso rotate."]},{"id":21,"slug":"pull-up","url":"https://www.nasm.org/resource-center/exercise-library/pull-up","title":"Pull-Up","difficulty":"Intermediate","equipment":["Pull-Up Bar"],"bodyParts":["Back","Latissimus Dorsi","Rhomboids","Traps","Shoulders","Posterior Deltoids","Arms","Brachialis"],"videoUrl":"https://www.youtube.com/watch?v=9yVGh3XbJ34","thumbnailUrl":"https://img.youtube.com/vi/9yVGh3XbJ34/hqdefault.jpg","localImage":"images/pull-up.jpg","steps":["Grab the pull-up bar with a 1-1.5x shoulder width grip, palms facing away from you. Draw in and brace the abs. Slightly pack the shoulders back and down.","Pull the body upward driving the chest toward the bar/handles until the arms/elbows are packed into the side of the body. Drive the shoulder blades back and down as you do.","Reverse the pattern and return to starting position.","Repeat. Maintain posture throughout. Avoid shrugging the shoulders, arching the lower back, swinging, jutting the head forward or not fully extending the elbows on the descent."]},{"id":22,"slug":"band-assisted-pull-up","url":"https://www.nasm.org/resource-center/exercise-library/band-assisted-pull-up","title":"Band Assisted Pull-Up","difficulty":"Intermediate","equipment":["Pull-Up Bar","Band or Tube"],"bodyParts":["Back","Latissimus Dorsi","Rhomboids","Traps","Shoulders","Posterior Deltoids","Arms","Brachialis"],"videoUrl":"https://www.youtube.com/watch?v=B_VkNQS5YLs","thumbnailUrl":"https://img.youtube.com/vi/B_VkNQS5YLs/hqdefault.jpg","localImage":"images/band-assisted-pull-up.jpg","steps":["Set and secure a band on the device to promote the assistance needed for your desired repetitions. Grab the pull up bar with a 1-1.5x shoulder width grip, palms facing away from you. Draw in and brace the abs. Slightly pack the shoulders back and down.","Step into the band. Pull the body upward driving the chest toward the bar/handles until the arms/elbows are packed into the side of the body. Drive the shoulder blades back and down as you do.","Reverse the pattern and return to starting position. Repeat. Maintain posture throughout. Avoid shrugging the shoulders, arching the lower back, swinging, jutting the head forward or not fully extending the elbows on the descent."]},{"id":23,"slug":"romanian-deadlift-barbell","url":"https://www.nasm.org/resource-center/exercise-library/romanian-deadlift-barbell","title":"Romanian Deadlift (Barbell)","difficulty":"Intermediate","equipment":["Barbell","Plates"],"bodyParts":["Thighs","Hamstrings","Groin","Glutes"],"videoUrl":"https://www.youtube.com/watch?v=xgusDooVfKU","thumbnailUrl":"https://img.youtube.com/vi/xgusDooVfKU/hqdefault.jpg","localImage":"images/romanian-deadlift-barbell.jpg","steps":["Stand with your feet hip to shoulder width apart and toes pointing ahead. Perform a deadlift to get the bar off the floor. Position the barbell over the midfoot.","Squat down to the bar and grab the bar with palms facing you. Draw in and brace the abs. Lock the shoulder blades back and down and position the spine in neutral. Drive the hips back and position the shins as vertically as possible. Balance the weight evenly over the foot.","Push into the floor to lift the bar, extending the knees and maintaining torso position. Keep the bar close to the body at all times.","Once the bar has passed the knee now perform the RDL. Drive the hips forward through the bar until the glutes fully contract.","Unlock the knees and reverse the pattern driving the hips back lowering the bar only as far as can be accomplished maintaining good posture and until the hamstrings are at full length.","Repeat. Maintain posture throughout. Avoid overarching or slouching the spine, letting the shoulder round forward, locking the knees, or overextending the neck."]},{"id":24,"slug":"russian-twist","url":"https://www.nasm.org/resource-center/exercise-library/russian-twist","title":"Russian Twist","difficulty":"Intermediate","equipment":["Stability Ball"],"bodyParts":["Core","Obliques","Glutes"],"videoUrl":"https://www.youtube.com/watch?v=s0kT80JLCfA","thumbnailUrl":"https://img.youtube.com/vi/s0kT80JLCfA/hqdefault.jpg","localImage":"images/russian-twist.jpg","steps":["Lie with upper back and head supported on a stability ball with good posture and feet hip width apart. Extend arms overhead and place hands together.","Starting in a bridged position, lock the arms and shoulder together as a unit and drive the hands and chest to the side rotating the body and rolling the ball backwards until you are on the side of your shoulder. Keep the hips bridged at all times.","Reverse the pattern and return to the starting position.","Repeat on the other side. Maintain posture throughout. Ensure balance, posture and control of the stability ball are maintained. Avoid turning the feet, dropping the hips, or using momentum."]},{"id":25,"slug":"reverse-crunch-to-knee-up-with-rotation","url":"https://www.nasm.org/resource-center/exercise-library/reverse-crunch-to-knee-up-with-rotation","title":"Reverse Crunch to Knee-Up with Rotation","difficulty":"Intermediate","equipment":["Bench"],"bodyParts":["Core","Rectus Abdominis","Obliques","Back","Latissimus Dorsi"],"videoUrl":"https://www.youtube.com/watch?v=wtKWBzDwfIM","thumbnailUrl":"https://img.youtube.com/vi/wtKWBzDwfIM/hqdefault.jpg","localImage":"images/reverse-crunch-to-knee-up-with-rotation.jpg","steps":["Lie supine the bench with knees at 90˚ and thighs pulled into the abs. Grab the bench behind your head for support. Draw in the abs. Lock the shoulders back and down.","Drive your knees toward your nose curling your hips and spine up off the bench.","Once you have crunched through a maximum range of motion, rotate your hips to one side while extending your legs and feet vertically toward the ceiling.","Reverse the pattern and return to the starting position.","Repeat on the other side. Maintain posture throughout. Lower yourself to the starting position, do not fall into it. Do not extend the legs or arch the back to create momentum to initiate the reverse crunch."]},{"id":26,"slug":"push-up","url":"https://www.nasm.org/resource-center/exercise-library/push-up","title":"Push-Up","difficulty":"Beginner","equipment":["None"],"bodyParts":["Chest","Shoulders","Anterior Deltoids","Triceps"],"videoUrl":"https://www.youtube.com/watch?v=WDIpL0pjun0","thumbnailUrl":"https://img.youtube.com/vi/WDIpL0pjun0/hqdefault.jpg","localImage":"images/push-up.jpg","steps":["Assume a push up position with the body in a straight line from head to heel, feet hip to shoulder width and hands 1.5-2x shoulder width. Brace the core and tighten the glutes. Press away from the floor to prevent the shoulder blades from winging.","Lower the chest toward the floor through a maximum range of motion until the chest is a few inches off the floor or shoulders have reached elbow depth.","Reverse the pattern and return to starting position.","Repeat. Maintain posture throughout. Keep the shoulders from elevating or rounding. Do not let the back round or arch or the hips sag or pike. Avoid letting the head jut forward."]},{"id":27,"slug":"plyometric-push-up","url":"https://www.nasm.org/resource-center/exercise-library/plyometric-push-up","title":"Plyometric Push-Up","difficulty":"Intermediate","equipment":["None"],"bodyParts":["Chest","Shoulders","Anterior Deltoids","Triceps"],"videoUrl":"https://www.youtube.com/watch?v=MH4gcTKQiEc","thumbnailUrl":"https://img.youtube.com/vi/MH4gcTKQiEc/hqdefault.jpg","localImage":"images/plyometric-push-up.jpg","steps":["Assume a push up position with the body in a straight line from head to heel, feet hip to shoulder width and hands 1.5-2x shoulder width. Brace the core and tighten the glutes. Press away from the floor to prevent the shoulder blades from winging.","Rapidly lower the chest toward the floor through a maximum range of motion until the chest is a few inches off the floor or shoulders have reached elbow depth.","Explosively reverse the pattern creating enough momentum to leave the ground.","As the hand lift off the floor, bring them together performing a clap and then land on the floor as softly as possible.","Repeat immediately. Maintain posture throughout. Keep the shoulders from elevating or rounding. Do not let the back round or arch or the hips sag or pike. Avoid jutting the head forward."]},{"id":28,"slug":"pike-push-up","url":"https://www.nasm.org/resource-center/exercise-library/pike-push-up","title":"Pike Push-Up","difficulty":"Intermediate","equipment":["None"],"bodyParts":["Shoulders","Anterior Deltoids","Deltoids","Traps","Triceps"],"videoUrl":"https://www.youtube.com/watch?v=2b5t0Cu2nQI","thumbnailUrl":"https://img.youtube.com/vi/2b5t0Cu2nQI/hqdefault.jpg","localImage":"images/pike-push-up.jpg","steps":["Position yourself on the floor similar to a down dog yoga set up (modified push up position with the tailbone piked up to the ceiling and arms and legs extended). Hands approximately 1-1.5x shoulder width, head in line with a neutral spine and toes pointing straight ahead. Draw in and brace the abs. Press away from the floor to stabilize the shoulder. Bend the knees as needed to ensure neutral spine.","Slowly lower yourself toward the floor, bending the arms out to the side driving the top of the forehead toward an imaginary line between your finger tips until you are about 1 inch from the floor.","Reverse the pattern and return to the starting position.","Repeat. Maintain posture throughout. Avoid arching or slouching the back, collapsing or overly shrugging the shoulders, jutting the head forward, or pulling the inside of the palms off the ground."]},{"id":29,"slug":"inverted-push-up","url":"https://www.nasm.org/resource-center/exercise-library/inverted-push-up","title":"Inverted Push-Up","difficulty":"Intermediate","equipment":["Box or Step"],"bodyParts":["Shoulders","Anterior Deltoids","Deltoids","Traps","Triceps"],"videoUrl":"https://www.youtube.com/watch?v=h45WmYKSJG0","thumbnailUrl":"https://img.youtube.com/vi/h45WmYKSJG0/hqdefault.jpg","localImage":"images/inverted-push-up.jpg","steps":["Position yourself similar to a down dog yoga set up (modified push up position with the tailbone piked up to the ceiling and arms and legs extended). Elevate the feet up onto a bench without sacrificing body position. Hands approximately 1-1.5x shoulder width, head in line with a neutral spine and toes pointing straight ahead. Draw in and brace the abs. Press away from the floor to stabilize the shoulder. Bend the knees as needed to ensure neutral spine.","Slowly lower yourself toward the floor, bending the arms out to the side driving the top of the forehead toward an imaginary line between your finger tips until you are about 1 inch from the floor.","Reverse the pattern and return to the starting position.","Repeat. Maintain posture throughout. Avoid arching or slouching the back, collapsing or overly shrugging the shoulders, jutting the head forward, or pulling the inside of the palms off the ground."]},{"id":30,"slug":"decline-push-up","url":"https://www.nasm.org/resource-center/exercise-library/decline-push-up","title":"Decline Push-Up","difficulty":"Intermediate","equipment":["Bench"],"bodyParts":["Chest","Shoulders","Anterior Deltoids","Triceps"],"videoUrl":"https://www.youtube.com/watch?v=DBz85WuXqMk","thumbnailUrl":"https://img.youtube.com/vi/DBz85WuXqMk/hqdefault.jpg","localImage":"images/decline-push-up.jpg","steps":["Assume a push up position with the body in a straight line from head to heel, feet hip to shoulder width elevated on a bench, and hands 1.5-2x shoulder width. Brace the core and tighten the glutes. Press away from the floor to prevent the shoulder blades from winging.","Lower the chest and head toward the floor through a maximum range of motion until the head is approximately one inch off the floor or shoulders have reached elbow depth.","Reverse the pattern and return to starting position.","Repeat. Maintain posture throughout. Keep the shoulders from elevating or rounding. Do not let the back round or arch or the hips sag or pike. Avoid letting the head jut forward."]},{"id":31,"slug":"incline-push-up","url":"https://www.nasm.org/resource-center/exercise-library/incline-push-up","title":"Incline Push-Up","difficulty":"Beginner","equipment":["Bench"],"bodyParts":["Chest","Shoulders","Anterior Deltoids","Triceps"],"videoUrl":"https://www.youtube.com/watch?v=0JUrOH--Kdk","thumbnailUrl":"https://img.youtube.com/vi/0JUrOH--Kdk/hqdefault.jpg","localImage":"images/incline-push-up.jpg","steps":["Assume a push up position with the body in a straight line from head to heel, feet hip to shoulder width, and hands 1.5-2x shoulder width elevated on a bench. Brace the core and tighten the glutes. Press away from the floor to prevent the shoulder blades from winging.","Lower the chest toward the bench through a maximum range of motion until the chest is approximately a few inches off the floor or shoulders have reached elbow depth.","Reverse the pattern and return to starting position.","Repeat. Maintain posture throughout. Keep the shoulders from elevating or rounding. Do not let the back round or arch or the hips sag or pike. Avoid letting the head jut forward."]},{"id":32,"slug":"archer-push-up","url":"https://www.nasm.org/resource-center/exercise-library/archer-push-up","title":"Archer Push-Up","difficulty":"Advanced","equipment":["Medicine Ball"],"bodyParts":["Chest","Shoulders","Anterior Deltoids","Triceps"],"videoUrl":"https://www.youtube.com/watch?v=IDu6pRAPChg","thumbnailUrl":"https://img.youtube.com/vi/IDu6pRAPChg/hqdefault.jpg","localImage":"images/archer-push-up.jpg","steps":["Assume a push up position with the body in a straight line from head to heel and feet hip to shoulder width. Position one hand at an approximate 1.5-2x shoulder width position with the other hand extended out to the side with a slight bend in the elbow and hand atop a medicine ball with fingers pointing to the side. Brace the core and tighten the glutes.","Press away from the floor to prevent the shoulder blades from winging."]},{"id":33,"slug":"modified-push-up","url":"https://www.nasm.org/resource-center/exercise-library/modified-push-up","title":"Modified Push-Up","difficulty":"Beginner","equipment":["None"],"bodyParts":["Chest","Shoulders","Anterior Deltoids","Triceps"],"videoUrl":"https://www.youtube.com/watch?v=PDr5B2jLUOw","thumbnailUrl":"https://img.youtube.com/vi/PDr5B2jLUOw/hqdefault.jpg","localImage":"images/modified-push-up.jpg","steps":["Assume a push up position on the knees with the body in a straight line from head to knee, feet/knees hip to shoulder width and hands 1.5-2x shoulder width. Brace the core and tighten the glutes. Press away from the floor to prevent the shoulder blades from winging.","Lower the chest toward the floor through a maximum range of motion until the chest is a few inches off the floor or shoulders have reached elbow depth.","Reverse the pattern and return to starting position.","Repeat. Maintain posture throughout. Keep the shoulders from elevating or rounding. Do not let the back round or arch or the hips sag or pike. Avoid letting the head jut forward."]},{"id":34,"slug":"leg-press-calf-raise","url":"https://www.nasm.org/resource-center/exercise-library/leg-press-calf-raise","title":"Leg Press Calf Raise","difficulty":"Beginner","equipment":["Leg Press Machine"],"bodyParts":["Calves"],"videoUrl":"https://www.youtube.com/watch?v=8k435cj30gc","thumbnailUrl":"https://img.youtube.com/vi/8k435cj30gc/hqdefault.jpg","localImage":"images/leg-press-calf-raise.jpg","steps":["Sit in the leg press machine with feet hip width apart and straight ahead on the leg press platform. Hang the heel of the foot off the edge so that only the ball of the foot and toes are in contact with the platform. Draw in and brace the abs. Lock the shoulder blades back and down and keep the knees straight but not locked.","Lower the platform down toward the body ensuring the knees stay aligned with the middle toes and arch of the foot is maintained. Move through a maximum range without losing technique or bottoming out into a stretch.","Return to the starting position.","Reverse the pattern and press through the ball of the foot keeping the emphasis on the first three toes.","Repeat. Maintain posture throughout. Avoid locking the knees, bouncing at the bottom of the movement to create momentum, rolling out over the small toe and locking the ankle to rest or collapsing the knees and arch of the foot in."]},{"id":35,"slug":"jumping-jacks","url":"https://www.nasm.org/resource-center/exercise-library/jumping-jacks","title":"Jumping Jacks","difficulty":"Beginner","equipment":["None"],"bodyParts":["Full Body"],"videoUrl":"https://www.youtube.com/watch?v=uLVt6u15L98","thumbnailUrl":"https://img.youtube.com/vi/uLVt6u15L98/hqdefault.jpg","localImage":"images/jumping-jacks.jpg","steps":["Stand in an athletic stance with feet hip to shoulder width apart, toes pointing forward and arms at the sides. Draw in the abs.","Perform a small and rapid knee and ankle bend and then rapidly jump the feet out to the side of your body while simultaneously bringing the arms out to your sides and up overhead.","Land as softly and quietly as possible with your toes pointing forward.","As soon as you land, reverse the pattern and jump back to the starting position.","Repeat. Maintain posture throughout. Avoid slouching, turning the toes outward or landing hard."]},{"id":36,"slug":"leg-press","url":"https://www.nasm.org/resource-center/exercise-library/leg-press","title":"Leg Press","difficulty":"Beginner","equipment":["Leg Press Machine"],"bodyParts":["Thighs","Quadriceps","Glutes","Groin"],"videoUrl":"https://www.youtube.com/watch?v=cDGOn-yfKJA","thumbnailUrl":"https://img.youtube.com/vi/cDGOn-yfKJA/hqdefault.jpg","localImage":"images/leg-press.jpg","steps":["Sit in the leg press machine with feet hip to shoulder width apart and straight ahead on the leg press platform. Ensure foot height placement allows for good range of movement at both the hip and knee. Draw in and brace the abs. Lock the shoulder blades back and down. Stabilize the upper body by grasping the handles.","Lower the platform down toward the body ensuring the knees stay aligned with the middle toes and weight is distributed evenly across the foot. Move through a maximum range without losing technique or bottoming out the thighs into the rib cage.","Reverse the pattern and return to starting position.","Repeat. Maintain posture throughout. Avoid locking the knees, bouncing at the bottom of the movement to create momentum, rounding the spine or letting the hips come off the pad, or collapsing the knees inward."]},{"id":37,"slug":"single-leg-press","url":"https://www.nasm.org/resource-center/exercise-library/single-leg-press","title":"Single Leg Press","difficulty":"Beginner","equipment":["Leg Press Machine"],"bodyParts":["Thighs","Quadriceps","Glutes","Groin"],"videoUrl":"https://www.youtube.com/watch?v=3aYsOsBA7ZE","thumbnailUrl":"https://img.youtube.com/vi/3aYsOsBA7ZE/hqdefault.jpg","localImage":"images/single-leg-press.jpg","steps":["Sit in the leg press machine with feet hip to shoulder width apart and straight ahead on the leg press platform. Ensure foot height placement allows for good range of movement at both the hip and knee. Let one foot rest on the foot rest below. Draw in and brace the abs. Lock the shoulder blades back and down. Stabilize the upper body by grasping the handles.","Lower the platform down toward the body ensuring the knee stays aligned with the middle toes and weight is distributed evenly across the foot. Move through a maximum range without losing technique or bottoming out the thighs into the rib cage.","Reverse the pattern and return to starting position.","Repeat. Maintain posture throughout. Avoid locking the knees, bouncing at the bottom of the movement to create momentum, rounding the spine or letting the hips come off the pad, or collapsing the knees inward. Do not let the hips or torso rotate."]},{"id":38,"slug":"box-jumps","url":"https://www.nasm.org/resource-center/exercise-library/box-jumps","title":"Box Jumps","difficulty":"Intermediate","equipment":["Box or Step"],"bodyParts":["Glutes","Thighs","Hamstrings","Quadriceps","Calves"],"videoUrl":"https://www.youtube.com/watch?v=DXu-8TAJwi4","thumbnailUrl":"https://img.youtube.com/vi/DXu-8TAJwi4/hqdefault.jpg","localImage":"images/box-jumps.jpg","steps":["Stand with your feet hip to shoulder width apart and toes pointing straight ahead. Draw in the belly button.","Rapidly descend to a depth that feels explosive (typically around a quarter squat) while pulling the arms back to the side.","Quickly and powerfully reverse the pattern and jump up and forward, raising the arms above the head. Land as quietly as possible on the box.","Once balanced, step down off the box. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid knees collapsing inward, back arching or slouching, or uncontrolled head movement."]},{"id":39,"slug":"iron-cross","url":"https://www.nasm.org/resource-center/exercise-library/iron-cross","title":"Iron Cross","difficulty":"Intermediate","equipment":["None"],"bodyParts":["Back","Erector Spinae","Glutes","Medius","Chest"],"videoUrl":"https://www.youtube.com/watch?v=uBEXsoMclPY","thumbnailUrl":"https://img.youtube.com/vi/uBEXsoMclPY/hqdefault.jpg","localImage":"images/iron-cross.jpg","steps":["Lie supine with the arms stretched to the side, palms up, and the feet together with legs straight. Draw in the abs.","Using momentum, bring one foot across the body toward the opposite hand through maximum range of motion.","Reverse the pattern and return to the starting position.","Repeat with the other leg. Maintain posture throughout. Avoid letting the shoulders pull up off the floor, holding the breath, or back excessively round."]},{"id":40,"slug":"kettlebell-crush-curl-with-squat","url":"https://www.nasm.org/resource-center/exercise-library/kettlebell-crush-curl-with-squat","title":"Kettlebell Crush Curl with Squat","difficulty":"Beginner","equipment":["Kettlebell"],"bodyParts":["Arms","Brachialis","Biceps"],"videoUrl":"https://www.youtube.com/watch?v=BPGOyQKy9R0","thumbnailUrl":"https://img.youtube.com/vi/BPGOyQKy9R0/hqdefault.jpg","localImage":"images/kettlebell-crush-curl-with-squat.jpg","steps":["Squat into a deep squat position with feet wider than shoulder width and toes rotated slightly out. Lock shoulder blades back and down and brace core.","Grip the kettlebell bottoms up (upside down) with handle positioned between forearms and hands wrapped around the bell. Slowly lower the kettlebell performing a bicep curl.","Once elbows have reached full extension, reverse the pattern and curl the weight up to the chest through a full range.","Repeat. Maintain posture throughout. Minimize shoulder forward roll or elbow swing behind or in front of body. Do not bottom out on the squat or let the hamstrings rest on the calves."]},{"id":41,"slug":"face-pull","url":"https://www.nasm.org/resource-center/exercise-library/face-pull","title":"Face Pull","difficulty":"Beginner","equipment":["Cable Machine","Rope"],"bodyParts":["Shoulders","Back","Arms"],"videoUrl":"https://www.youtube.com/watch?v=eTCBSFlCJ_s","thumbnailUrl":"https://img.youtube.com/vi/eTCBSFlCJ_s/hqdefault.jpg","localImage":"images/face-pull.jpg","steps":["Position the cable slightly above the head and grasp the rope with the thumbs pointing toward you. Stand tall with your feet slightly staggered and toes pointing straight ahead. Draw your abs.","Pull the cable toward your face by bending your elbows out to the side and pinching your shoulder blades together attempting to drive your fists by your ears.","Reverse the pattern and return to the starting position.","Repeat. Maintain posture throughout. Avoid jutting the chin forward, arching the lower back, letting the ribs flare, or shrugging the shoulders."]},{"id":42,"slug":"cable-crossover","url":"https://www.nasm.org/resource-center/exercise-library/cable-crossover","title":"Cable Crossover","difficulty":"Beginner","equipment":["Cable Machine"],"bodyParts":["Chest","Shoulders","Anterior Deltoids"],"videoUrl":"https://www.youtube.com/watch?v=XY6JrX1wyxk","thumbnailUrl":"https://img.youtube.com/vi/XY6JrX1wyxk/hqdefault.jpg","localImage":"images/cable-crossover.jpg","steps":["Ensure cables are adjusted at chest height. Stand with your back toward the cable machine. Grab the handles and hold them out to the side of your body with your palms facing forward. Draw in and brace your abs. Lock shoulder blades back and down.","Drive the hands forward and together in an arcing motion allowing the hands to pass with one hand above and one below.","Reverse the pattern and return to the starting position moving through a maximum range of motion that technique can be maintained.","Repeat, alternating the top/bottom hand. Maintain posture throughout. Avoid arching or slouching the back, jutting the chin forward, slouching or shrugging the shoulders."]},{"id":43,"slug":"standing-tubing-row","url":"https://www.nasm.org/resource-center/exercise-library/standing-tubing-row","title":"Standing Tubing Row","difficulty":"Beginner","equipment":["Band or Tube"],"bodyParts":["Upper Back","Mid Back"],"videoUrl":"https://www.youtube.com/watch?v=qykwviNOIyc","thumbnailUrl":"https://img.youtube.com/vi/qykwviNOIyc/hqdefault.jpg","localImage":"images/standing-tubing-row.jpg","steps":["Stand facing tubing attachment point with your feet straight and hip-to-shoulder-width apart. Hold the handles with extended arms at chest level.","Knees slightly bent, row by bringing the thumb of the left hand toward the armpit and squeeze the shoulder blades together. Do not shrug the shoulders or jut the head forward. Pause.","Return to the start position.","Repeat for the desired number of repetitions."]},{"id":44,"slug":"close-grip-bench-press","url":"https://www.nasm.org/resource-center/exercise-library/close-grip-bench-press","title":"Close Grip Bench Press","difficulty":"Beginner","equipment":["Bench"],"bodyParts":["Deltoids","Triceps"],"videoUrl":"https://www.youtube.com/watch?v=LJeqLAmJLfs","thumbnailUrl":"https://img.youtube.com/vi/LJeqLAmJLfs/hqdefault.jpg","localImage":"images/close-grip-bench-press.jpg","steps":["Lie on the bench with your feet straight and flat on the floor. Grasp the barbell to narrower-than-shoulder-width apart.","Unrack the bar and bring it directly over shoulders with straight arms (this is the starting position).","Press the bar up, fully extending the arms returning to the starting position. Pause.","Repeat for the desired number of repetitions."]},{"id":45,"slug":"dead-bug","url":"https://www.nasm.org/resource-center/exercise-library/dead-bug","title":"Dead Bug","difficulty":"Beginner","equipment":["None"],"bodyParts":["Core"],"videoUrl":"https://www.youtube.com/watch?v=bxn9FBrt4-A","thumbnailUrl":"https://img.youtube.com/vi/bxn9FBrt4-A/hqdefault.jpg","localImage":"images/dead-bug.jpg","steps":["Lie supine on the floor with your arms and legs extended behind and in front of you. Draw in your abs.","Slowly and simultaneously lift your opposite arm and leg bringing the arm above the shoulder and knee above your hip at 90˚ angles.","Reverse the pattern and return to the starting position.","Repeat on the other side. Maintain posture throughout. Avoid arching the back, letting the ribs flare or body rotate."]},{"id":46,"slug":"lunge-jump","url":"https://www.nasm.org/resource-center/exercise-library/lunge-jump","title":"Lunge Jump","difficulty":"Intermediate","equipment":["None"],"bodyParts":["Full Body","Glutes","Thighs","Calves"],"videoUrl":"https://www.youtube.com/watch?v=_5kDxC0flg0","thumbnailUrl":"https://img.youtube.com/vi/_5kDxC0flg0/hqdefault.jpg","localImage":"images/lunge-jump.jpg","steps":["Start in a lunge position with arms pulled back, trail leg a few inches off the floor, and knees at approximately 90˚. Draw in the abs.","Rapidly explode upward off both legs and jump.","As you leave the ground, switch the legs in the air landing with the other leg out in front. Land as quietly as possible, keeping the feet, knees, and hips pointing straight ahead.","Upon impact immediately repeat. Maintain posture throughout. Avoid landing hard/loudly, letting the heels strike the ground hard, allowing the knees to collapse inward or your back to arch or slouch."]},{"id":47,"slug":"seated-machine-row-close-grip","url":"https://www.nasm.org/resource-center/exercise-library/seated-machine-row-close-grip","title":"Seated Machine Row: Close Grip","difficulty":"Beginner","equipment":["Seated Cable Row Machine"],"bodyParts":["Back","Latissimus Dorsi","Rhomboids","Traps","Shoulders","Posterior Deltoids","Arms","Biceps"],"videoUrl":"https://www.youtube.com/watch?v=k0cTJCfxa0Y","thumbnailUrl":"https://img.youtube.com/vi/k0cTJCfxa0Y/hqdefault.jpg","localImage":"images/seated-machine-row-close-grip.jpg","steps":["Sit tall with good posture on the bench and place your feet on the platform with a slight bend in the knee. Grip handles so palms face one another. Draw in and brace the abs. Lock the shoulder blades back and down and align the head with the spine.","Slowly pull the handles back to a comfortable range of motion driving the hands toward the lower ribs and pinching the shoulder blades together.","Reverse the pattern and return to the starting position.","Repeat. Maintain posture throughout. Avoid jutting the chin forward, arching or slouching the lower back, letting the shoulders round or shrug, or leaning forward at the waist/spine and creating momentum."]},{"id":48,"slug":"child-s-pose","url":"https://www.nasm.org/resource-center/exercise-library/child-s-pose","title":"Child's Pose","difficulty":"Beginner","equipment":["None"],"bodyParts":["Shoulders","Posterior Shoulder","Back","Latissimus Dorsi","Erector Spinae","Shins"],"videoUrl":"https://www.youtube.com/watch?v=_ZX_zTOBgp8","thumbnailUrl":"https://img.youtube.com/vi/_ZX_zTOBgp8/hqdefault.jpg","localImage":"images/child-s-pose.jpg","steps":["Get into a quadruped (on all fours) position with toes pointed and together, knees apart and glutes sitting on your heels.","Slowly slide your hands forward on the floor allowing your chest to drop and arms to extend out in front of you.","Lower and reach and roll the thumbs upward as far as possible until a good stretch is felt in the shoulders, latissimus hips or lower back.","Hold for the recommended time.","Maintain posture throughout. Keep a relaxed breathing pattern. Avoid letting the head fall toward the ground, holding the breath, or straining into a stretch."]},{"id":49,"slug":"tuck-jump","url":"https://www.nasm.org/resource-center/exercise-library/tuck-jump","title":"Tuck Jump","difficulty":"Intermediate","equipment":["None"],"bodyParts":["Full Body","Glutes","Thighs","Calves"],"videoUrl":"https://www.youtube.com/watch?v=-bnJGikRGsM","thumbnailUrl":"https://img.youtube.com/vi/-bnJGikRGsM/hqdefault.jpg","localImage":"images/tuck-jump.jpg","steps":["Stand in athletic posture with feet hip to shoulder width apart and toes pointing forward. Draw in the abs.","Drop into a squat rapidly driving the hips back, arms pull back until approximately a quarter squat depth is reached (you should feel explosive from this position).","Rapidly change directions and jump up, bringing both knees toward the chest as you leave the ground. Attempt to get your thighs parallel with the ground.","Land as quietly as possible, keeping the feet, knees, and hips pointing straight ahead. Upon impact immediately repeat.","Maintain posture throughout. Avoid landing hard/loudly, letting the heels strike the ground hard, allowing the knees to collapse inward or your back to arch or slouch."]},{"id":50,"slug":"two-arm-standing-cable-fly","url":"https://www.nasm.org/resource-center/exercise-library/two-arm-standing-cable-fly","title":"Two-Arm Standing Cable Fly","difficulty":"Beginner","equipment":["Cable Machine"],"bodyParts":["Chest","Shoulders","Anterior Deltoids"],"videoUrl":"https://www.youtube.com/watch?v=XNf6TBErGys","thumbnailUrl":"https://img.youtube.com/vi/XNf6TBErGys/hqdefault.jpg","localImage":"images/two-arm-standing-cable-fly.jpg","steps":["Ensure cables are adjusted at chest height. Stand with your back toward the cable machine. Grab the handles and hold them out to the side of your body with your palms facing forward. Draw in and brace your abs. Lock shoulder blades back and down.","Drive the hands forward and together in an arcing motion until the hands touch.","Reverse the pattern and return to the starting position moving through a maximum range of motion that technique can be maintained.","Repeat. Maintain posture throughout. Avoid arching or slouching the back, jutting the chin forward, slouching or shrugging the shoulders."]},{"id":51,"slug":"bench-dips","url":"https://www.nasm.org/resource-center/exercise-library/bench-dips","title":"Bench Dips","difficulty":"Intermediate","equipment":["Bench"],"bodyParts":["Triceps","Shoulders","Anterior Deltoids"],"videoUrl":"https://www.youtube.com/watch?v=WVeZDBhZwLA","thumbnailUrl":"https://img.youtube.com/vi/WVeZDBhZwLA/hqdefault.jpg","localImage":"images/bench-dips.jpg","steps":["Position yourself just off the edge of the bench with hands shoulder width apart on the edge in good posture. Knees at 90˚. Draw in and brace the abs. Lock the shoulder blades back and down.","Slowly lower your body by bending at the elbows and shoulders until your arm at the forearms creates a 90-degree angle. Maintain posture throughout.","Repeat. Avoid jutting the chin forward, letting the shoulders round forward or shrug, or letting the back round."]},{"id":52,"slug":"chest-press-machine","url":"https://www.nasm.org/resource-center/exercise-library/chest-press-machine","title":"Chest Press Machine","difficulty":"Beginner","equipment":["Chest Press Machine"],"bodyParts":["Chest","Shoulders","Anterior Deltoids","Triceps"],"videoUrl":"https://www.youtube.com/watch?v=lRo9zZ7EwpM","thumbnailUrl":"https://img.youtube.com/vi/lRo9zZ7EwpM/hqdefault.jpg","localImage":"images/chest-press-machine.jpg","steps":["Adjust machine so that handles are at lower chest height. Ensure posture is tall and core is braced.","Depress the foot lever to bring the arms forward and grasp handles approximately 1.5x shoulder width. Release foot lever.","Slowly press forward until the arms are completely extended.","Reverse the pattern and return to the starting position moving through a maximum, comfortable range of motion that technique can be maintained.","Repeat. Keep shoulders down, chin from jutting forward and back from arching or rounding."]},{"id":53,"slug":"single-arm-dumbbell-chest-press","url":"https://www.nasm.org/resource-center/exercise-library/single-arm-dumbbell-chest-press","title":"Single-Arm Dumbbell Chest Press","difficulty":"Intermediate","equipment":["Bench","Dumbbells"],"bodyParts":["Chest","Shoulders","Anterior Deltoids"],"videoUrl":"https://www.youtube.com/watch?v=qFTnmyC-nf4","thumbnailUrl":"https://img.youtube.com/vi/qFTnmyC-nf4/hqdefault.jpg","localImage":"images/single-arm-dumbbell-chest-press.jpg","steps":["Lie supine with neutral spine on a bench with your feet straight and flat on the floor. Draw in and brace the abs and lock the shoulders blades back and down on the bench. Hold the dumbbell at approximately shoulder level to begin slightly out to the sides of the body in line with the chest.","Press the dumbbell up and in until the arm is completely extended ending with it directly above the shoulder.","Reverse the pattern and return the starting position.","Repeat. Maintain posture throughout. Do not arch the back or jut the head forward. Avoid letting the shoulders round, posture shift or feet lift in the air. Keep the elbows under the dumbbells to maintain balance at all times."]},{"id":54,"slug":"two-arm-dumbbell-chest-press-with-band","url":"https://www.nasm.org/resource-center/exercise-library/two-arm-dumbbell-chest-press-with-band","title":"Two-Arm Dumbbell Chest Press with Band","difficulty":"Intermediate","equipment":["Bench","Dumbbells","Band or Tube"],"bodyParts":["Chest","Shoulders","Anterior Deltoids"],"videoUrl":"https://www.youtube.com/watch?v=_x5m-s8xTf0","thumbnailUrl":"https://img.youtube.com/vi/_x5m-s8xTf0/hqdefault.jpg","localImage":"images/two-arm-dumbbell-chest-press-with-band.jpg","steps":["Wrap band around the upper back/lower shoulder blade area and in the palms prior to picking up dumbbells. Lie supine with neutral spine on a bench with your feet straight and flat on the floor. Draw in and brace the abs and lock the shoulders blades back and down on the bench. Hold the dumbbells at approximately shoulder level to begin slightly out to the sides of the body in line with the chest.","Press the dumbbells up and together until the arms are completely extended ending with them directly above the shoulders.","Reverse the pattern and return to the starting position.","Repeat. Maintain posture throughout. Do not arch the back or jut the head forward. Avoid letting the shoulders round, posture shift or feet lift in the air. Keep the elbows under the dumbbells to maintain balance at all times."]},{"id":55,"slug":"single-arm-incline-dumbbell-chest-press","url":"https://www.nasm.org/resource-center/exercise-library/single-arm-incline-dumbbell-chest-press","title":"Single-Arm Incline Dumbbell Chest Press","difficulty":"Intermediate","equipment":["Bench","Dumbbells"],"bodyParts":["Chest","Shoulders","Anterior Deltoids"],"videoUrl":"https://www.youtube.com/watch?v=iJ-GwVeUuCg","thumbnailUrl":"https://img.youtube.com/vi/iJ-GwVeUuCg/hqdefault.jpg","localImage":"images/single-arm-incline-dumbbell-chest-press.jpg","steps":["Lie supine with neutral spine on an incline bench with your feet straight and flat on the floor. Draw in and brace the abs and lock the shoulders blades back and down on the bench. Hold the dumbbell at approximately shoulder level to begin slightly out to the sides of the body in line with the chest.","Press the dumbbell up and in until the arm is completely extended ending with it directly above the shoulder.","Reverse the pattern and return the starting position.","Repeat. Maintain posture throughout. Do not arch the back or jut the head forward. Avoid letting the shoulders round, posture shift or feet lift in the air. Keep the elbows under the dumbbells to maintain balance at all times."]},{"id":56,"slug":"two-arm-incline-dumbbell-chest-press","url":"https://www.nasm.org/resource-center/exercise-library/two-arm-incline-dumbbell-chest-press","title":"Two-Arm Incline Dumbbell Chest Press","difficulty":"Beginner","equipment":["Bench","Dumbbells"],"bodyParts":["Chest","Shoulders","Anterior Deltoids"],"videoUrl":"https://www.youtube.com/watch?v=JKnpHchOWPU","thumbnailUrl":"https://img.youtube.com/vi/JKnpHchOWPU/hqdefault.jpg","localImage":"images/two-arm-incline-dumbbell-chest-press.jpg","steps":["Lie supine with neutral spine on an incline bench with your feet straight and flat on the floor. Draw in and brace the abs and lock the shoulders blades back and down on the bench. Hold the dumbbells at approximately shoulder level to begin slightly out to the sides of the body in line with the chest.","Press the dumbbells up and together until the arms are completely extended ending with them directly above the shoulders.","Reverse the pattern and return to the starting position.","Repeat. Maintain posture throughout. Do not arch the back or jut the head forward. Avoid letting the shoulders round, posture shift or feet lift in the air. Keep the elbows under the dumbbells to maintain balance at all times."]},{"id":57,"slug":"lying-leg-curl-two-leg-concentric-single-leg-eccentric","url":"https://www.nasm.org/resource-center/exercise-library/lying-leg-curl-two-leg-concentric-single-leg-eccentric","title":"Lying Leg Curl: Two-Leg Concentric, Single-Leg Eccentric","difficulty":"Intermediate","equipment":["Lying Leg Curl Machine"],"bodyParts":["Thighs","Hamstrings","Calves"],"videoUrl":"https://www.youtube.com/watch?v=_7sVQlruVZc","thumbnailUrl":"https://img.youtube.com/vi/_7sVQlruVZc/hqdefault.jpg","localImage":"images/lying-leg-curl-two-leg-concentric-single-leg-eccentric.jpg","steps":["Lie face down on the leg curl machine with feet hip width apart, abs drawn in and braced and glutes flexed. Ensure setup positions knee close to hinge on the machine and pad resting on lower calf/achilles. Position head in line with the back and lock shoulder blades back and down.","Pull toes toward the knees then drive the heels up toward the glutes as far as possible without arching the lower back or lifting the hips off of the pad.","Take one leg off the pad and return it to the starting position.","Now holding the resistance with one leg, reverse the pattern and lower the weight back to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid overarching the lower back, pointing or turning the toes out or letting the head fall toward the pad."]},{"id":58,"slug":"lying-leg-curl-single-leg","url":"https://www.nasm.org/resource-center/exercise-library/lying-leg-curl-single-leg","title":"Lying Leg Curl: Single-Leg","difficulty":"Beginner","equipment":["Lying Leg Curl Machine"],"bodyParts":["Thighs","Hamstrings","Calves"],"videoUrl":"https://www.youtube.com/watch?v=kGIfh3hHY0w","thumbnailUrl":"https://img.youtube.com/vi/kGIfh3hHY0w/hqdefault.jpg","localImage":"images/lying-leg-curl-single-leg.jpg","steps":["Lie face down on the leg curl machine with feet hip width apart, abs drawn in and braced and glutes flexed. Ensure setup positions knee close to hinge on the machine and pad resting on lower calf/achilles. Position head in line with the back and lock shoulder blades back and down.","Pull toes toward the knees then drive the heel up toward the glutes as far as possible without arching the lower back or lifting the hips off of the pad. Leave one leg lying flat/extended on the pad.","Reverse the pattern and lower the weight back to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid overarching the lower back, pointing or turning the toes out or letting the head fall toward the pad."]},{"id":59,"slug":"seated-leg-curl","url":"https://www.nasm.org/resource-center/exercise-library/seated-leg-curl","title":"Seated Leg Curl","difficulty":"Beginner","equipment":["Leg Curl Machine"],"bodyParts":["Hamstrings","Calves"],"videoUrl":"https://www.youtube.com/watch?v=_2Kd0d-JEUM","thumbnailUrl":"https://img.youtube.com/vi/_2Kd0d-JEUM/hqdefault.jpg","localImage":"images/seated-leg-curl.jpg","steps":["Sit in the leg curl machine with feet hip width apart, abs drawn in and braced and toes pulled toward the nose. Ensure setup positions knee close to hinge on the machine and pad resting on lower calf/achilles.","Position head in line with the back and lock shoulder blades back and down. Drive the heels down toward the glutes as far as possible without arching the lower back.","Reverse the pattern and lower the weight back to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid overarching the lower back, pointing or turning the toes out or jutting the chin forward."]},{"id":60,"slug":"single-leg-seated-leg-curl","url":"https://www.nasm.org/resource-center/exercise-library/single-leg-seated-leg-curl","title":"Single-Leg Seated Leg Curl","difficulty":"Beginner","equipment":["Leg Curl Machine"],"bodyParts":["Thighs","Hamstrings","Calves"],"videoUrl":"https://www.youtube.com/watch?v=PXNJ71rksvU","thumbnailUrl":"https://img.youtube.com/vi/PXNJ71rksvU/hqdefault.jpg","localImage":"images/single-leg-seated-leg-curl.jpg","steps":["Sit in the leg curl machine with feet hip width apart, abs drawn in and braced and toe pulled toward the nose. Ensure setup positions knee close to hinge on the machine and pad resting on lower calf/achilles. Hang one leg straight down. Position head in line with the back and lock shoulder blades back and down.","Drive the heels down toward the glutes as far as possible without arching the lower back.","Reverse the pattern and lower the weight back to the starting position. Maintain posture throughout.","Repeat for the desired number of repetitions. Avoid overarching the lower back, pointing or turning the toes out or jutting the chin forward."]},{"id":61,"slug":"single-leg-squat","url":"https://www.nasm.org/resource-center/exercise-library/single-leg-squat","title":"Single-Leg Squat","difficulty":"Advanced","equipment":["None"],"bodyParts":["Quadriceps","Groin","Glutes"],"videoUrl":"https://www.youtube.com/watch?v=sSXnaFyhiZs","thumbnailUrl":"https://img.youtube.com/vi/sSXnaFyhiZs/hqdefault.jpg","localImage":"images/single-leg-squat.jpg","steps":["Stand on one foot with hands on hips, toe pointed straight forward and neutral spine. Draw in your abs.","Squat down on one leg as deep as possible driving the hips back and maintaining form. Make sure the knee is aligned with the toe.","Repeat. Maintain balance throughout. Ensure weight is balanced, back doesn't round or excessively arch, knee does not collapse inward, and torso and hips do not rotate."]},{"id":62,"slug":"single-leg-squat-touchdown","url":"https://www.nasm.org/resource-center/exercise-library/single-leg-squat-touchdown","title":"Single-Leg Squat Touchdown","difficulty":"Advanced","equipment":["None"],"bodyParts":["Quadriceps","Glutes","Groin"],"videoUrl":"https://www.youtube.com/watch?v=h6lET2_DLA0","thumbnailUrl":"https://img.youtube.com/vi/h6lET2_DLA0/hqdefault.jpg","localImage":"images/single-leg-squat-touchdown.jpg","steps":["Stand tall with your feet hip to shoulder width apart and toes pointing straight ahead. Draw in the abs.","Lift one leg directly beside the support leg. Slowly squat like you are sitting in a chair while reaching the hand opposite of the balance leg toward the toes of the opposite foot.","Reverse the pattern and return to the starting position. Maintain.","Repeat. Maintain posture throughout. Avoid slouching or excessively arching the back, letting the shoulder roll forward, heel lifting off the ground or knee collapsing inward."]},{"id":63,"slug":"single-leg-squat-to-row","url":"https://www.nasm.org/resource-center/exercise-library/single-leg-squat-to-row","title":"Single-Leg Squat to Row","difficulty":"Advanced","equipment":["Cable Machine"],"bodyParts":["Quadriceps","Groin","Glutes","Hamstrings","Biceps","Mid Back","Posterior Shoulder"],"videoUrl":"https://www.youtube.com/watch?v=LmGbrgGJS6E","thumbnailUrl":"https://img.youtube.com/vi/LmGbrgGJS6E/hqdefault.jpg","localImage":"images/single-leg-squat-to-row.jpg","steps":["Adjust the cable to approximately belly bottom height. Stand on one foot with hand on hip, toe pointed straight forward and neutral spine. Brace your core. With your opposite hand, grasp the cable handle."]},{"id":64,"slug":"barbell-bench-press","url":"https://www.nasm.org/resource-center/exercise-library/barbell-bench-press","title":"Barbell Bench Press","difficulty":"Beginner","equipment":["Bench","Barbell","Plates","Safety Collars"],"bodyParts":["Chest"],"videoUrl":"https://www.youtube.com/watch?v=CayG6UYqL8g","thumbnailUrl":"https://img.youtube.com/vi/CayG6UYqL8g/hqdefault.jpg","localImage":"images/barbell-bench-press.jpg","steps":["Lie supine on your back with neutral spine on a bench with your feet straight and flat on the floor. Draw in and brace the abs and lock the shoulders blades back and down on the bench. Grasp the barbell at about 1.5 - 2x shoulder width ensuring the hands are evenly distributed on the bar.","Unrack the bar (always use a spotter if you are able) bringing it directly above the shoulders. Starting with arms extended, slowly lower the bar toward the mid to lower chest moving through the maximum comfortable range.","Reverse the pattern and return the starting position.","Repeat. Maintain posture throughout. Do not arch the back or jut the head forward. Avoid letting the shoulders round, posture shift or feet lift in the air. Keep the elbows under the bar to maintain balance at all times."]},{"id":65,"slug":"barbell-bench-press-with-bands","url":"https://www.nasm.org/resource-center/exercise-library/barbell-bench-press-with-bands","title":"Barbell Bench Press with Bands","difficulty":"Advanced","equipment":["Bench","Barbell","Plates","Safety Collars","Band or Tube"],"bodyParts":["Chest"],"videoUrl":"https://www.youtube.com/watch?v=N4H4o8k9WbE","thumbnailUrl":"https://img.youtube.com/vi/N4H4o8k9WbE/hqdefault.jpg","localImage":"images/barbell-bench-press-with-bands.jpg","steps":["Attach resistance bands or tubes around the barbell and anchor them to heavy dumbbells on the floor. Lie supine on your back with neutral spine on a bench with your feet straight and flat on the floor. Draw in and brace the abs and lock the shoulders blades back and down on the bench. Grasp the barbell at about 1.5 - 2x shoulder width ensuring the hands are evenly distributed on the bar.","Unrack the bar (always use a spotter if you are able) bringing it directly above the shoulders. Starting with arms extended, slowly lower the bar toward the mid to lower chest moving through the maximum comfortable range.","Reverse the pattern and return the starting position.","Repeat. Maintain posture throughout. Do not arch the back or jut the head forward. Avoid letting the shoulders round, posture shift or feet lift in the air. Keep the elbows under the bar to maintain balance at all times."]},{"id":66,"slug":"barbell-bench-press-with-chains","url":"https://www.nasm.org/resource-center/exercise-library/barbell-bench-press-with-chains","title":"Barbell Bench Press with Chains","difficulty":"Advanced","equipment":["Bench","Barbell","Plates","Safety Collars","Chains"],"bodyParts":["Chest"],"videoUrl":"https://www.youtube.com/watch?v=6UKcYcDme-Y","thumbnailUrl":"https://img.youtube.com/vi/6UKcYcDme-Y/hqdefault.jpg","localImage":"images/barbell-bench-press-with-chains.jpg","steps":["Attach chains that attach to the collars or directly to the barbell. Lie supine on your back with neutral spine on a bench with your feet straight and flat on the floor. Draw in and brace the abs and lock the shoulders blades back and down on the bench. Grasp the barbell at about 1.5 - 2x shoulder width ensuring the hands are evenly distributed on the bar.","Unrack the bar (always use a spotter if you are able) bringing it directly above the shoulders. Starting with arms extended, slowly lower the bar toward the mid to lower chest moving through the maximum comfortable range.","Reverse the pattern and return the starting position.","Repeat. Maintain posture throughout. Do not arch the back or jut the head forward. Avoid letting the shoulders round, posture shift or feet lift in the air. Keep the elbows under the bar to maintain balance at all times.
