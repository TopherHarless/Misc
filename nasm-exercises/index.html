"]},{"id":67,"slug":"incline-barbell-bench-press","url":"https://www.nasm.org/resource-center/exercise-library/incline-barbell-bench-press","title":"Incline Barbell Bench Press","difficulty":"Intermediate","equipment":["Bench","Barbell","Plates","Safety Collars"],"bodyParts":["Chest"],"videoUrl":"https://www.youtube.com/watch?v=BjGLs6KGWUc","thumbnailUrl":"https://img.youtube.com/vi/BjGLs6KGWUc/hqdefault.jpg","localImage":"images/incline-barbell-bench-press.jpg","steps":["Lie supine on your back with neutral spine on an incline bench with your feet straight and flat on the floor. Draw in and brace the abs and lock the shoulders blades back and down on the bench. Grasp the barbell at about 1.5 - 2x shoulder width ensuring the hands are evenly distributed on the bar.","Unrack the bar (always use a spotter if you are able) bringing it directly above the shoulders.","Starting with arms extended, slowly lower the bar toward the chest moving through the maximum comfortable range.","Reverse the pattern and return the starting position. Repeat. Maintain posture throughout. Do not arch the back or jut the head forward. Avoid letting the shoulders round, posture shift or feet lift in the air. Keep the elbows under the bar to maintain balance at all times."]},{"id":68,"slug":"foam-roll-adductors","url":"https://www.nasm.org/resource-center/exercise-library/foam-roll-adductors","title":"Foam Roll: Adductors","difficulty":"Beginner","equipment":["Foam Roller"],"bodyParts":["Groin"],"videoUrl":"https://www.youtube.com/watch?v=Nqol0T6rKDg","thumbnailUrl":"https://img.youtube.com/vi/Nqol0T6rKDg/hqdefault.jpg","localImage":"images/foam-roll-adductors.jpg","steps":["From a modified plank, position the foam roller underneath the groin with the thigh out to your side. Using your arms and other leg for support, increase the amount of pressure on the muscle until you feel a manageable level of tenderness.","Then, roll the length of the muscle area at about 1 inch per second looking for the most tender area.","Once you've found the most tender area, hold the position and pressure there for the recommended time. Maintain posture throughout.","Repeat on the other side. Avoid continuous movement, letting the head fall forward, collapsing the shoulders or spine, or holding your breath."]},{"id":69,"slug":"foam-roll-calves","url":"https://www.nasm.org/resource-center/exercise-library/foam-roll-calves","title":"Foam Roll: Calves","difficulty":"Beginner","equipment":["Foam Roller"],"bodyParts":["Groin","Calves"],"videoUrl":"https://www.youtube.com/watch?v=6f2LO5EeB0I","thumbnailUrl":"https://img.youtube.com/vi/6f2LO5EeB0I/hqdefault.jpg","localImage":"images/foam-roll-calves.jpg","steps":["From a seated position, place the foam roller underneath the calf and stack the other leg on top. Using your arms for support, increase the amount of pressure on the muscle until you feel a manageable level of tenderness. Keep the foot/toes in a relaxed point position.","Then, roll the length of the muscle area at about 1 inch per second looking for the most tender area. Once you've found the most tender area, hold the position and pressure there for the recommended time. Maintain posture throughout.","Repeat on the other side. Avoid continuous movement, letting the head fall forward, collapsing the shoulders or spine, or holding your breath."]},{"id":70,"slug":"foam-roll-latissimus-dorsi","url":"https://www.nasm.org/resource-center/exercise-library/foam-roll-latissimus-dorsi","title":"Foam Roll: Latissimus Dorsi","difficulty":"Beginner","equipment":["Foam Roller"],"bodyParts":["Mid Back"],"videoUrl":"https://www.youtube.com/watch?v=5S2suclGl7o","thumbnailUrl":"https://img.youtube.com/vi/5S2suclGl7o/hqdefault.jpg","localImage":"images/foam-roll-latissimus-dorsi.jpg","steps":["Lay down with the foam roller under your arm pit. Using your arms for support, increase the amount of pressure on the muscle until you feel a manageable level of tenderness.","Then, roll the length of the muscle to about mid rib area at about 1 inch per second looking for the most tender area.","Once you've found the most tender area, hold the position and pressure there for the recommended time. Maintain posture throughout.","Repeat on the other side. Avoid continuous movement, letting the head fall forward or holding your breath."]},{"id":71,"slug":"static-butterfly-stretch","url":"https://www.nasm.org/resource-center/exercise-library/static-butterfly-stretch","title":"Static: Butterfly Stretch","difficulty":"Beginner","equipment":["None"],"bodyParts":["Groin"],"videoUrl":"https://www.youtube.com/watch?v=v4OLkxi5-Q0","thumbnailUrl":"https://img.youtube.com/vi/v4OLkxi5-Q0/hqdefault.jpg","localImage":"images/static-butterfly-stretch.jpg","steps":["Sit on the floor with your knees bent and the soles of your feet together. Draw in the abs.","Grasp your feet and ankles and slowly let your knees fall toward the floor.","Slowly sit into the tallest position you can driving the chest up to the sky and pulling the body toward a forward leaning position using your elbows to press the thighs outward until a stretch is felt in the groin. Hold position for 20-30 seconds.","Repeat on the other side. Maintain posture throughout. Keep a relaxed breathing pattern. Avoid letting the head fall forward and back or shoulders slouch."]},{"id":72,"slug":"static-latissimus-dorsi-ball-stretch","url":"https://www.nasm.org/resource-center/exercise-library/static-latissimus-dorsi-ball-stretch","title":"Static: Latissimus Dorsi Ball Stretch","difficulty":"Beginner","equipment":["Stability Ball"],"bodyParts":["Latissimus Dorsi"],"videoUrl":"https://www.youtube.com/watch?v=kEH6jatSVSw","thumbnailUrl":"https://img.youtube.com/vi/kEH6jatSVSw/hqdefault.jpg","localImage":"images/static-latissimus-dorsi-ball-stretch.jpg","steps":["Get into quadruped (on all fours) position with hands under shoulders and knees under hips. Draw in the abs and press away from the floor with with the hands to stabilize the shoulder blades.","Position one forearm on the physioball with thumb pointing upward.","Slowly roll the ball forward/away from the body until a stretch is felt in the latissimus. Hold position for 20-30 seconds.","Repeat on the other side. Maintain posture throughout. Keep a relaxed breathing pattern. Keep the back slightly rounded. Avoid letting the head fall toward the ground or arching of the lower back."]},{"id":73,"slug":"static-seated-calf-stretch","url":"https://www.nasm.org/resource-center/exercise-library/static-seated-calf-stretch","title":"Static: Seated Calf Stretch","difficulty":"Beginner","equipment":["Stretch Strap"],"bodyParts":["Calves"],"videoUrl":"https://www.youtube.com/watch?v=83G00Fwlqqw","thumbnailUrl":"https://img.youtube.com/vi/83G00Fwlqqw/hqdefault.jpg","localImage":"images/static-seated-calf-stretch.jpg","steps":["Sit on a bench with good posture. Position one leg on the bench with kneecap and toe pointing straight upward. Wrap a stretch strap around the ball of the foot.","Draw in the abs and ensure the leg is straight. Pull the toes toward the nose until a good stretch is felt in the calf. Hold for the recommended time.","Repeat on the other leg. Maintain posture throughout. Avoid slouching, rounding the shoulders, letting the arch of the foot collapse or the knee to rotate in."]},{"id":74,"slug":"static-standing-adductor-stretch","url":"https://www.nasm.org/resource-center/exercise-library/static-standing-adductor-stretch","title":"Static: Standing Adductor Stretch","difficulty":"Beginner","equipment":["None"],"bodyParts":["Groin"],"videoUrl":"https://www.youtube.com/watch?v=IzHUoWs0maQ","thumbnailUrl":"https://img.youtube.com/vi/IzHUoWs0maQ/hqdefault.jpg","localImage":"images/static-standing-adductor-stretch.jpg","steps":["Stand tall with good posture. Draw the the abs in. Take a long step to the side while keeping the toes pointing straight ahead.","Slowly sit into a lateral squat with one leg while keeping the other leg completely straight until a good stretch is felt in the groin of the straight leg. Hold for the recommended time.","Repeat on the other leg. Maintain posture throughout. Keep a relaxed breathing pattern. Avoid rounding/flattening of the lower back. Keep the hips square and do not rotate them."]},{"id":75,"slug":"single-leg-balance-reach-frontal-plane","url":"https://www.nasm.org/resource-center/exercise-library/single-leg-balance-reach-frontal-plane","title":"Single-Leg Balance Reach: Frontal Plane","difficulty":"Beginner","equipment":["None"],"bodyParts":["Full Body"],"videoUrl":"https://www.youtube.com/watch?v=UrB5wA7B3hI","thumbnailUrl":"https://img.youtube.com/vi/UrB5wA7B3hI/hqdefault.jpg","localImage":"images/single-leg-balance-reach-frontal-plane.jpg","steps":["Stand in athletic posture one one foot with hands on hips, toe pointed straight forward, neutral spine, and abs drawn in.","Move the floating foot to the side as far as possible without compromising posture.","Reverse the movement and return to starting position.","Repeat. Maintain posture throughout. Ensure toes are forward at all times, hips stay level and balance is maintained."]}];
const state = { q:"", diff:new Set(), body:new Set(), equip:new Set(), vid:false, img:false };
function counts(field) {
  const c = {};
  EX.forEach(e => {
    const vals = Array.isArray(e[field]) ? e[field] : [e[field]];
    vals.forEach(v => { if(v) c[v] = (c[v]||0)+1; });
  });
  return c;
}
function buildSidebar() {
  fill("fDiff",  counts("difficulty"), state.diff);
  fill("fBody",  counts("bodyParts"),  state.body);
  fill("fEquip", counts("equipment"),  state.equip);
}
function fill(id, counts, stateSet) {
  const el = document.getElementById(id);
  el.innerHTML = Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(function(entry) {
    const val = entry[0], cnt = entry[1];
    return '<label><input type="checkbox" value="' + esc(val) + '"> ' + esc(val) + ' <span class="count">' + cnt + '</span></label>';
  }).join("");
  el.querySelectorAll("input").forEach(function(cb) {
    cb.addEventListener("change", function() {
      cb.checked ? stateSet.add(cb.value) : stateSet.delete(cb.value);
      render();
    });
  });
}
function filtered() {
  return EX.filter(function(e) {
    if (state.q) {
      const q = state.q.toLowerCase();
      if (![e.title, e.difficulty].concat(e.bodyParts, e.equipment).join(" ").toLowerCase().includes(q)) return false;
    }
    if (state.diff.size && !state.diff.has(e.difficulty)) return false;
    if (state.body.size && !e.bodyParts.some(function(b){return state.body.has(b);})) return false;
    if (state.equip.size && !e.equipment.some(function(q){return state.equip.has(q);})) return false;
    if (state.vid && !e.videoUrl) return false;
    if (state.img && !e.localImage && !e.thumbnailUrl) return false;
    return true;
  });
}
var _vis = [];
function render() {
  _vis = filtered();
  const grid = document.getElementById("grid");
  document.getElementById("countEl").textContent = _vis.length + " of " + EX.length + " exercises";
  document.getElementById("empty").style.display = _vis.length ? "none" : "block";
  grid.innerHTML = _vis.map(function(e, i) {
    const img = e.thumbnailUrl;
    const imgEl = img
      ? '<img class="card-img" src="' + esc(img) + '" loading="lazy" onerror="this.remove()">'
      : '<div class="card-placeholder">💪</div>';
    const diffCls = "tag-diff " + (e.difficulty || "");
    const bpTags  = e.bodyParts.slice(0,2).map(function(b){ return '<span class="tag tag-bp">' + esc(b) + '</span>'; }).join("");
    const eqTags  = e.equipment.slice(0,2).map(function(q){ return '<span class="tag tag-eq">' + esc(q) + '</span>'; }).join("");
    const diffTag = e.difficulty ? '<span class="tag ' + diffCls + '">' + esc(e.difficulty) + '</span>' : "";
    const vidBadge = e.videoUrl ? '<div class="vid-badge">▶</div>' : "";
    return '<div class="card" onclick="openModal(' + i + ')">'  + imgEl + vidBadge
      + '<div class="card-body"><div class="card-title">' + esc(e.title) + '</div>'
      + '<div class="tags">' + diffTag + bpTags + eqTags + '</div></div></div>';
  }).join("");
}
function openModal(idx) {
  const e = _vis[idx];
  document.getElementById("mTitle").textContent = e.title;
  const img = e.localImage || e.thumbnailUrl;
  var html = img ? '<img class="modal-img" src="' + esc(img) + '" onerror="this.remove()">' : "";
  html += '<div class="meta-row">';
  if (e.difficulty) html += '<div class="meta-chip"><h4>Difficulty</h4><p>' + esc(e.difficulty) + '</p></div>';
  if (e.bodyParts.length) html += '<div class="meta-chip"><h4>Muscles / Body Part</h4><p>' + esc(e.bodyParts.join(", ")) + '</p></div>';
  if (e.equipment.length) html += '<div class="meta-chip"><h4>Equipment</h4><p>' + esc(e.equipment.join(", ")) + '</p></div>';
  html += '</div>';
  if (e.steps && e.steps.length) {
    html += '<div class="steps-title">Instructions</div><ol class="steps">';
    e.steps.forEach(function(s) { html += "<li>" + esc(s) + "</li>"; });
    html += '</ol>';
  }
  html += '<div class="modal-links">';
  if (e.videoUrl) html += '<a class="modal-link" href="' + esc(e.videoUrl) + '" target="_blank">▶ Watch on YouTube</a>';
  html += '<a class="modal-link" href="' + esc(e.url) + '" target="_blank">↗ View on NASM</a>';
  html += '</div>';
  document.getElementById("mBody").innerHTML = html;
  document.getElementById("overlay").classList.add("open");
}
function closeModal(ev) { if (ev.target === document.getElementById("overlay")) closeModalDirect(); }
function closeModalDirect() { document.getElementById("overlay").classList.remove("open"); }
document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeModalDirect(); });
function clearAll() {
  state.q = ""; state.diff.clear(); state.body.clear(); state.equip.clear();
  state.vid = false; state.img = false;
  document.getElementById("q").value = "";
  document.getElementById("chkVideo").checked = false;
  document.getElementById("chkImg").checked = false;
  document.querySelectorAll(".filter-list input[type=checkbox]").forEach(function(c){c.checked=false;});
  render();
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
document.getElementById("q").addEventListener("input", function(e) { state.q = e.target.value.trim(); render(); });
document.getElementById("chkVideo").addEventListener("change", function(e) { state.vid = e.target.checked; render(); });
document.getElementById("chkImg").addEventListener("change", function(e) { state.img = e.target.checked; render(); });
buildSidebar();
render();
</script>
</body>
