<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NASM OPT Workout Builder</title>
<style>
  /* ===== BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1a3a6b;
    --navy-dark: #122a50;
    --navy-light: #2a5298;
    --blue-section: #4a7bc4;
    --blue-section-light: #d6e4f7;
    --accent: #e8861a;
    --white: #ffffff;
    --gray-100: #f5f7fa;
    --gray-200: #e8ecf0;
    --gray-300: #d0d7e0;
    --gray-500: #8a96a3;
    --gray-700: #4a5568;
    --text: #1a202c;
    --red: #e53e3e;
    --green: #38a169;
    --phase-badge: #e8f4d4;
    --phase-badge-text: #2d6a1e;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-100); color: var(--text); min-height: 100vh; }

  /* ===== APP SHELL ===== */
  #app-header {
    background: var(--navy);
    color: white;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 32px;
    height: 56px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #app-header .logo { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; }
  #app-header .logo span { color: #f0a040; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    color: rgba(255,255,255,0.7);
    padding: 6px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    border: none;
    background: none;
    white-space: nowrap;
  }
  .nav-tab:hover { color: white; background: rgba(255,255,255,0.12); }
  .nav-tab.active { color: white; background: rgba(255,255,255,0.2); }
  #app-content { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }

  /* ===== VIEWS ===== */
  .view { display: none; }
  .view.active { display: block; }

  /* ===== WEEK PLANNER ===== */
  .week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .week-header h2 { font-size: 22px; font-weight: 700; color: var(--navy); }
  .week-nav { display: flex; align-items: center; gap: 12px; }
  .week-label { font-size: 15px; font-weight: 600; color: var(--navy); min-width: 180px; text-align: center; }
  .btn-icon { background: var(--white); border: 1px solid var(--gray-300); border-radius: 6px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--navy); transition: all 0.15s; }
  .btn-icon:hover { background: var(--blue-section-light); border-color: var(--navy-light); }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .day-card {
    background: var(--white);
    border-radius: 10px;
    border: 2px solid var(--gray-200);
    min-height: 160px;
    overflow: hidden;
    transition: border-color 0.15s;
    display: flex;
    flex-direction: column;
  }
  .day-card:hover { border-color: var(--navy-light); }
  .day-card.has-workout { border-color: var(--blue-section); }
  .day-header {
    background: var(--navy);
    color: white;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .day-header .date-num { font-size: 16px; font-weight: 700; }
  .day-body { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .day-workout-pill {
    background: var(--blue-section-light);
    border: 1px solid var(--blue-section);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
    transition: background 0.15s;
  }
  .day-workout-pill:hover { background: #c5d9f2; }
  .pill-name { font-weight: 600; color: var(--navy); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pill-phase { background: var(--navy); color: white; border-radius: 3px; padding: 1px 5px; font-size: 10px; font-weight: 700; white-space: nowrap; }
  .pill-remove { color: var(--gray-500); cursor: pointer; font-size: 14px; line-height: 1; flex-shrink: 0; }
  .pill-remove:hover { color: var(--red); }
  .day-add-btn {
    color: var(--gray-500);
    font-size: 12px;
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
    border: 1px dashed var(--gray-300);
    justify-content: center;
    transition: all 0.15s;
    margin-top: auto;
  }
  .day-add-btn:hover { color: var(--navy); border-color: var(--navy-light); background: var(--blue-section-light); }
  .day-rest { color: var(--gray-500); font-size: 12px; text-align: center; padding: 16px 0; font-style: italic; }

  /* ===== WORKOUT LIBRARY ===== */
  .library-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .library-header h2 { font-size: 22px; font-weight: 700; color: var(--navy); }
  .library-section { margin-bottom: 36px; }
  .library-section-header { margin-bottom: 14px; }
  .library-section-header h3 { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 2px; }
  .library-section-sub { font-size: 12px; color: var(--gray-500); }
  .workout-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .wc-empty { color: var(--gray-500); font-size: 13px; padding: 20px 0; }
  .template-card { border-color: var(--accent) !important; opacity: 0.92; }
  .template-card .workout-card-header { background: var(--navy-dark); }
  .wc-template-badge { background: var(--accent); color: white; border-radius: 3px; padding: 1px 6px; font-size: 10px; font-weight: 700; }
  .prog-filter-bar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: nowrap; }
  .prog-filter-btn { background: var(--gray-200); color: var(--gray-700); border: 2px solid transparent; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .prog-filter-btn:hover { background: var(--blue-section-light); color: var(--navy); border-color: var(--navy-light); }
  .prog-filter-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
  .prog-filter-label { font-size: 14px; font-weight: 700; color: var(--navy); margin-top: 20px; margin-bottom: 14px; }
  .workout-card {
    background: var(--white);
    border-radius: 10px;
    border: 2px solid var(--gray-200);
    overflow: hidden;
    transition: all 0.15s;
  }
  .workout-card:hover { border-color: var(--navy-light); box-shadow: 0 4px 16px rgba(26,58,107,0.12); transform: translateY(-1px); }
  .workout-card-header { background: var(--navy); color: white; padding: 14px 16px; }
  .workout-card-header .wc-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .workout-card-header .wc-meta { font-size: 12px; color: rgba(255,255,255,0.7); display: flex; gap: 12px; }
  .workout-card-body { padding: 14px 16px; }
  .wc-sections { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .wc-section-tag { background: var(--blue-section-light); color: var(--navy); border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .wc-exercise-count { color: var(--gray-500); font-size: 12px; }
  .workout-card-actions { padding: 10px 16px; border-top: 1px solid var(--gray-200); display: flex; gap: 8px; }
  .btn { border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy-light); }
  .btn-secondary { background: var(--gray-200); color: var(--gray-700); }
  .btn-secondary:hover { background: var(--gray-300); }
  .btn-outline { background: transparent; color: var(--navy); border: 1px solid var(--navy-light); }
  .btn-outline:hover { background: var(--blue-section-light); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid #fc8181; }
  .btn-danger:hover { background: #fff5f5; }
  .btn-success { background: var(--green); color: white; }
  .btn-success:hover { background: #2f855a; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #d4751a; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .new-workout-card {
    background: white;
    border-radius: 10px;
    border: 2px dashed var(--gray-300);
    min-height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--gray-500);
  }
  .new-workout-card:hover { border-color: var(--navy-light); color: var(--navy); background: var(--blue-section-light); }
  .new-workout-card .plus { font-size: 32px; line-height: 1; }
  .new-workout-card .label { font-size: 14px; font-weight: 600; }

  /* ===== WORKOUT BUILDER ===== */
  .builder-topbar {
    background: white;
    border-radius: 10px;
    border: 1px solid var(--gray-200);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    gap: 16px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .field-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
  .field-group label { font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }
  .field-group input, .field-group select {
    border: 1px solid var(--gray-300);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    color: var(--text);
    background: var(--gray-100);
    outline: none;
    transition: border-color 0.15s;
  }
  .field-group input:focus, .field-group select:focus { border-color: var(--navy-light); background: white; }
  .builder-actions { display: flex; gap: 8px; align-items: flex-end; }

  /* Workout Sections */
  .workout-section { margin-bottom: 16px; border-radius: 10px; overflow: hidden; border: 1px solid var(--gray-200); background: white; }
  .section-header {
    background: var(--blue-section);
    color: white;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .section-header .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
  .section-count { background: rgba(255,255,255,0.25); border-radius: 10px; padding: 1px 8px; font-size: 11px; }
  .section-toggle { font-size: 12px; color: rgba(255,255,255,0.8); }
  .section-body { padding: 0; }
  .section-body.collapsed { display: none; }

  /* Exercise Rows */
  .exercise-table { width: 100%; border-collapse: collapse; }
  .exercise-table th {
    background: var(--blue-section-light);
    color: var(--navy);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--gray-300);
  }
  .exercise-table td { padding: 8px 10px; border-bottom: 1px solid var(--gray-200); vertical-align: middle; }
  .exercise-table tr:last-child td { border-bottom: none; }
  .exercise-table tr:hover td { background: var(--gray-100); }
  .exercise-table .col-name { font-size: 13px; font-weight: 600; color: var(--navy); }
  .exercise-table .col-sub { font-size: 11px; color: var(--gray-500); }
  .ex-note-inline { font-size: 11px; color: var(--gray-500); font-style: italic; margin-top: 3px; border: none; background: transparent; width: 100%; outline: none; padding: 0; font-family: inherit; cursor: text; }
  .ex-note-inline:focus { color: var(--text); font-style: normal; }
  .ex-note-inline::placeholder { color: var(--gray-300); }
  .ex-input { border: 1px solid var(--gray-300); border-radius: 5px; padding: 5px 7px; font-size: 13px; width: 100%; min-width: 60px; background: white; outline: none; }
  .ex-input:focus { border-color: var(--navy-light); }
  .ex-remove { color: var(--gray-300); cursor: pointer; font-size: 18px; line-height: 1; }
  .ex-remove:hover { color: var(--red); }
  .add-exercise-row { padding: 10px 16px; border-top: 1px dashed var(--gray-300); }
  .btn-add-ex { background: none; border: 1px dashed var(--blue-section); color: var(--blue-section); border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
  .btn-add-ex:hover { background: var(--blue-section-light); border-style: solid; }

  /* ===== EXERCISE PICKER MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 12px;
    width: 780px;
    max-width: 95vw;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-header { background: var(--navy); color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .modal-header h3 { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 24px; cursor: pointer; line-height: 1; }
  .modal-close:hover { color: white; }
  .modal-search { padding: 14px 16px; border-bottom: 1px solid var(--gray-200); flex-shrink: 0; }
  .modal-search input { width: 100%; border: 1px solid var(--gray-300); border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; }
  .modal-search input:focus { border-color: var(--navy-light); }
  .modal-body { display: flex; flex: 1; overflow: hidden; }
  .modal-sidebar { width: 180px; border-right: 1px solid var(--gray-200); overflow-y: auto; flex-shrink: 0; padding: 8px; }
  .modal-sidebar-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--gray-700); transition: all 0.12s; }
  .modal-sidebar-item:hover { background: var(--blue-section-light); color: var(--navy); }
  .modal-sidebar-item.active { background: var(--navy); color: white; }
  .modal-list { flex: 1; overflow-y: auto; padding: 8px; }
  .modal-ex-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
  }
  .modal-ex-item:hover { background: var(--blue-section-light); border-color: var(--blue-section); }
  .modal-ex-name { font-size: 14px; font-weight: 600; color: var(--navy); }
  .modal-ex-meta { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
  .modal-ex-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .modal-phase-badge { background: var(--phase-badge); color: var(--phase-badge-text); border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: 700; }
  .no-results { text-align: center; color: var(--gray-500); padding: 40px 20px; font-size: 14px; }
  /* ===== EQUIPMENT PICKER PANEL ===== */
  #b-setting-btn { width:100%;border:1px solid var(--gray-300);border-radius:8px;padding:9px 14px;background:white;cursor:pointer;text-align:left;font-size:14px;display:flex;align-items:center;justify-content:space-between;color:var(--navy) }
  #b-setting-btn:hover { border-color:var(--navy-light) }
  #b-setting-panel { position:absolute;left:0;right:0;top:calc(100% + 4px);background:white;border:1px solid var(--gray-200);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.13);z-index:500;padding:14px;min-width:320px;overflow-y:auto }
  .equip-presets { display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--gray-200) }
  .equip-preset-btn { padding:4px 10px;border-radius:20px;border:1px solid var(--gray-300);background:white;cursor:pointer;font-size:12px;font-weight:600;color:var(--gray-700);transition:all .12s }
  .equip-preset-btn:hover { background:var(--blue-section-light);border-color:var(--navy-light) }
  .equip-preset-btn.active { background:var(--navy);color:white;border-color:var(--navy) }
  .equip-chip-grid { display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px }
  .equip-chip { padding:4px 10px;border-radius:20px;border:1px solid var(--gray-300);background:white;cursor:pointer;font-size:12px;font-weight:500;color:var(--gray-700);user-select:none;transition:all .12s }
  .equip-chip:hover { border-color:var(--navy-light);background:var(--blue-section-light) }
  .equip-chip.active { background:var(--navy);color:white;border-color:var(--navy) }
  .equip-impact-row { display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid var(--gray-200);font-size:13px;color:var(--gray-700);cursor:pointer }

  .picker-filter-row { padding: 8px 16px; border-bottom: 1px solid var(--gray-200); display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0; }
  .picker-filter-row:empty { display: none; }
  .picker-chip { padding: 3px 10px; border-radius: 20px; border: 1px solid var(--gray-300); font-size: 12px; font-weight: 600; cursor: pointer; background: white; color: var(--gray-700); transition: all 0.12s; user-select: none; }
  .picker-chip:hover { border-color: var(--navy-light); background: var(--blue-section-light); }
  .picker-chip.active { background: var(--navy); color: white; border-color: var(--navy); }
  .picker-chip-label { font-size: 10px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; align-self: center; padding: 0 2px; }
  .modal-best-badge { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: 700; }
  .modal-ex-item.ex-already-added { opacity: 0.45; }
  .ex-added-badge { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: 700; }
  .ex-pick-info { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--gray-400); padding: 2px 4px; line-height: 1; border-radius: 4px; flex-shrink: 0; }
  .ex-pick-info:hover { color: var(--navy); background: var(--blue-section-light); }
  .picker-group-label { font-size: 10px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.6px; padding: 10px 12px 4px; }
  .picker-group-label:first-child { padding-top: 4px; }
  .modal-ex-item.recommended { border-left: 3px solid var(--navy-light); background: var(--blue-section-light); }
  .modal-ex-item.recommended:hover { background: #dbeafe; }
  .ex-info-btn { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--gray-400); padding: 0 3px; line-height: 1; vertical-align: middle; border-radius: 4px; }
  .ex-info-btn:hover { color: var(--navy); }

  /* ===== ASSIGN WORKOUT MODAL ===== */
  .assign-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
  .assign-group-label { font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 4px 2px; border-top: 1px solid var(--gray-200); margin-top: 4px; }
  .assign-group-label:first-child { border-top: none; margin-top: 0; }
  .assign-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border: 1px solid var(--gray-200); border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .assign-item:hover { border-color: var(--navy-light); background: var(--blue-section-light); }
  .assign-item .ai-name { font-size: 14px; font-weight: 600; color: var(--navy); }
  .assign-item .ai-meta { font-size: 12px; color: var(--gray-500); }

  /* ===== TOASTS ===== */
  #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--navy); color: white; padding: 12px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.2); animation: slideIn 0.25s ease; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ===== PRINT / PDF ===== */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body > *, #app-header, #toast-container, .modal-overlay { display: none !important; }
    #print-area { display: block !important; }
  }
  #print-area {
    display: none;
    font-family: Arial, sans-serif;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
    font-size: 12px;
  }
  .print-header-bar {
    background: #1a3a6b !important;
    color: white !important;
    padding: 14px 18px;
    border-radius: 4px 4px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .print-header-bar h1 { font-size: 20px; font-weight: 700; }
  .print-client-info { border: 1px solid #aaa; border-top: none; }
  .print-info-row { display: flex; border-bottom: 1px solid #aaa; }
  .print-info-cell { padding: 6px 10px; flex: 1; border-right: 1px solid #aaa; font-size: 12px; }
  .print-info-cell:last-child { border-right: none; }
  .print-info-label { font-weight: 700; }
  .print-table { width: 100%; border-collapse: collapse; margin-top: 0; }
  .print-table th { background: #1a3a6b !important; color: white !important; padding: 6px 8px; text-align: center; font-size: 11px; font-weight: 700; border: 1px solid #999; }
  .print-table th.ex-col { text-align: left; }
  .print-section-row td { background: #4a7bc4 !important; color: white !important; font-weight: 700; font-size: 12px; padding: 5px 8px; border: 1px solid #999; }
  .print-table td { border: 1px solid #bbb; padding: 5px 8px; font-size: 11px; text-align: center; }
  .print-table td.ex-col { text-align: left; font-weight: 500; }
  .print-table tr.empty-row td { height: 22px; }
  .print-coaching { margin-top: 10px; font-size: 11px; border-top: 2px solid #1a3a6b; padding-top: 6px; }
  .print-coaching strong { font-size: 12px; }

  /* Injury chips */
  .injury-chip-row { width:100%; padding-top:4px; }
  .injury-chip-row label { font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px }
  .injury-chips { display:flex;flex-wrap:wrap;gap:6px }
  .injury-chip { padding:4px 10px;border-radius:20px;border:1px solid var(--gray-300);background:white;cursor:pointer;font-size:12px;font-weight:500;color:var(--gray-700);user-select:none;transition:all .12s }
  .injury-chip:hover { border-color:#f04438;background:#fef3f2 }
  .injury-chip.active { background:#fef3f2;color:#b42318;border-color:#f04438 }
  /* Swap info banner inside picker */
  #picker-swap-info { padding:10px 16px;background:#e8f0fe;border-bottom:1px solid #a0b4e8;font-size:13px;color:#1a3a6b;display:none }
  #picker-swap-info .swap-ex-name { font-weight:700;margin-bottom:2px }
  #picker-swap-info .swap-ex-muscles { font-size:12px;color:#3a5ea8 }

  /* ===== MOBILE ===== */
  @media (max-width: 640px) {
    /* Header: stack logo above nav, hide auth username */
    #app-header {
      height: auto;
      flex-wrap: wrap;
      gap: 0;
      padding: 8px 12px 0;
    }
    #app-header .logo {
      font-size: 15px;
      padding-bottom: 8px;
    }
    #auth-area {
      margin-left: auto !important;
    }
    #auth-user { display: none !important; }
    #auth-btn {
      font-size: 11px !important;
      padding: 4px 8px !important;
    }
    .nav-tabs {
      width: 100%;
      border-top: 1px solid rgba(255,255,255,0.15);
      padding: 6px 0;
      gap: 2px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .nav-tab {
      padding: 6px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    /* Content padding */
    #app-content { padding: 16px 12px; }

    /* Week planner: horizontal scroll on small screens */
    .week-header { flex-wrap: wrap; gap: 8px; }
    .week-label { min-width: unset; font-size: 13px; }
    .week-grid {
      grid-template-columns: repeat(7, minmax(100px, 1fr));
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
    }
    .day-card { min-height: 120px; }

    /* Library: single column */
    .workout-grid { grid-template-columns: 1fr; }
    .library-header { flex-wrap: wrap; gap: 10px; }
    .library-header > div { flex-wrap: wrap; gap: 6px; }
    .library-section-header h3 { font-size: 15px; }
    .prog-filter-btn { padding: 7px 12px; font-size: 12px; }

    /* Builder topbar: full-width fields */
    .builder-topbar { padding: 12px; gap: 10px; }
    .field-group { min-width: calc(50% - 5px); flex: none; }
    .field-group:first-child { min-width: 100%; } /* client name full width */
    .builder-actions {
      width: 100%;
      flex-wrap: wrap;
    }
    .builder-actions .btn { flex: 1; justify-content: center; font-size: 12px; padding: 8px 8px; }
    /* Equipment panel: fixed to viewport so it doesn't overflow horizontally */
    #b-setting-panel { position:fixed !important; left:8px !important; right:8px !important; min-width:0 !important; max-height:65vh; }

    /* Exercise table: hide less critical columns, compact inputs */
    .exercise-table th:nth-child(5),
    .exercise-table td:nth-child(5) { display: none; } /* hide REST column */
    .ex-input { min-width: 44px; font-size: 12px; padding: 4px 4px; }
    .exercise-table td { padding: 6px 4px; }
    .exercise-table th { padding: 6px 4px; font-size: 10px; }
    .exercise-table .col-name { font-size: 12px; }
    .exercise-table .col-sub { font-size: 10px; }

    /* Phase/coaching context box */
    .phase-context-box { font-size: 12px; }

    /* Exercise picker modal: stack sidebar above list */
    .modal { max-height: 92vh; border-radius: 12px 12px 0 0; align-self: flex-end; margin: 0; max-width: 100vw; width: 100vw; }
    .modal-overlay { align-items: flex-end; }
    .modal-body { flex-direction: column; }
    .modal-sidebar {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px;
      gap: 4px;
      max-height: unset;
    }
    .modal-sidebar-item { white-space: nowrap; padding: 6px 10px; flex-shrink: 0; }
    .modal-list { max-height: 52vh; }

    /* Toast positioning */
    #toast-container { bottom: 16px; right: 12px; left: 12px; }
    .toast { font-size: 13px; }
  }

  /* ===== EXERCISE LIBRARY TAB ===== */
  #view-exercises {
    --lb:#0f1117;--ls:#1a1d27;--ls2:#22263a;--lbr:#2e3352;
    --la:#6c63ff;--lt:#e8eaf6;--lt2:#8892b0;--lt3:#4a5568;
    --lgreen:#22c55e;
    background:var(--lb);color:var(--lt);font-family:'Inter',system-ui,sans-serif;height:calc(100vh - 56px);
  }
  #view-exercises.active{display:flex!important;flex-direction:column}
  .lib-header{background:var(--ls);border-bottom:1px solid var(--lbr);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
  #libSearchBox{flex:1;min-width:160px;background:var(--ls2);border:1px solid var(--lbr);border-radius:8px;padding:7px 12px;color:var(--lt);font-size:14px;outline:none}
  #libSearchBox::placeholder{color:var(--lt3)}
  #libSearchBox:focus{border-color:var(--la)}
  .lib-header-count{font-size:12px;color:var(--lt2);white-space:nowrap}
  .lib-layout{display:flex;flex:1;overflow:hidden}
  .lib-sidebar{width:252px;min-width:252px;background:var(--ls);border-right:1px solid var(--lbr);overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;flex-shrink:0}
  .lib-fs h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--lt2);margin-bottom:7px;font-weight:600}
  .lib-chips{display:flex;flex-wrap:wrap;gap:5px}
  .lib-chip{display:inline-flex;align-items:center;height:27px;padding:0 10px;border-radius:20px;border:1px solid var(--lbr);background:var(--ls2);color:var(--lt2);cursor:pointer;font-size:12px;transition:all .15s;user-select:none}
  .lib-chip:hover{border-color:var(--la);color:var(--lt)}
  .lib-chip.active{background:var(--la);border-color:var(--la);color:#fff;font-weight:600}
  .lib-clear{font-size:11px;color:var(--lt3);cursor:pointer;background:none;border:none;padding:0;text-decoration:underline}
  .lib-clear:hover{color:var(--la)}
  .lib-main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
  .lib-toolbar{padding:9px 14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--lbr);background:var(--ls);flex-shrink:0;flex-wrap:wrap}
  .lib-vbtn{background:var(--ls2);border:1px solid var(--lbr);color:var(--lt2);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px;transition:all .15s}
  .lib-vbtn.active,.lib-vbtn:hover{background:var(--la);border-color:var(--la);color:#fff}
  .lib-tc{font-size:12px;color:var(--lt2);margin-left:auto}
  .lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(256px,1fr));gap:10px;padding:14px}
  .lib-card{background:var(--ls);border:1px solid var(--lbr);border-radius:8px;padding:13px;display:flex;flex-direction:column;gap:7px;transition:border-color .15s;cursor:pointer}
  .lib-card:hover{border-color:var(--la)}
  .lib-thumb{width:calc(100% + 26px);aspect-ratio:16/9;object-fit:cover;display:block;margin:-13px -13px 10px;border-radius:8px 8px 0 0;background:var(--ls2)}
  .lib-name{font-weight:600;font-size:14px;color:var(--lt);line-height:1.3}
  .lib-muscles{font-size:11px;color:var(--lt2);margin-top:-2px}
  .lib-tags{display:flex;flex-wrap:wrap;gap:4px}
  .lib-tag{font-size:10px;padding:2px 6px;border-radius:10px;border:1px solid;font-weight:500}
  .lts{background:rgba(108,99,255,.15);color:#a8a4ff;border-color:rgba(108,99,255,.3)}
  .ltp{background:rgba(34,197,94,.1);color:#4ade80;border-color:rgba(34,197,94,.25)}
  .lte{background:rgba(245,158,11,.1);color:#fcd34d;border-color:rgba(245,158,11,.25)}
  .lib-addbtn{background:var(--ls2);border:1px solid var(--lbr);color:var(--lt2);border-radius:4px;padding:5px;font-size:12px;cursor:pointer;width:100%;transition:all .15s;text-align:center;margin-top:2px}
  .lib-addbtn:hover{background:var(--la);border-color:var(--la);color:#fff}
  .lib-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--lt3);text-align:center;gap:8px}
  /* lib table view */
  .lib-tw{padding:0 14px 14px;overflow-x:auto}
  .lib-tbl{width:100%;border-collapse:collapse;font-size:13px;color:var(--lt)}
  .lib-tbl th{text-align:left;padding:9px 10px;color:var(--lt2);font-size:11px;font-weight:600;text-transform:uppercase;border-bottom:1px solid var(--lbr);background:var(--ls);position:sticky;top:0;z-index:10}
  .lib-tbl td{padding:9px 10px;border-bottom:1px solid var(--lbr);vertical-align:middle}
  .lib-tbl tr:hover td{background:var(--ls2)}
  /* lib detail modal */
  #libModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1100;align-items:center;justify-content:center;padding:20px;--ls:#1a1d27;--ls2:#22263a;--lbr:#2e3352;--la:#6c63ff;--lt:#e8eaf6;--lt2:#8892b0;--lt3:#4a5568;--lgreen:#22c55e}
  #libModal.open{display:flex}
  .lib-mc{background:var(--ls);border:1px solid var(--lbr);border-radius:12px;max-width:560px;width:100%;max-height:84vh;overflow-y:auto;padding:22px;color:var(--lt)}
  .lib-mh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
  .lib-mt{font-size:19px;font-weight:700}
  .lib-mx{background:none;border:none;color:var(--lt2);font-size:22px;cursor:pointer;line-height:1;padding:0}
  .lib-ms{margin-bottom:13px}
  .lib-ms h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--lt2);margin-bottom:5px;font-weight:600}
  .lib-ms p,.lib-ms li{font-size:13px;color:var(--lt);line-height:1.6}
  .lib-ms ol{padding-left:16px}
  .lib-notes{background:var(--ls2);border:1px solid var(--lbr);border-radius:8px;padding:11px;font-size:13px;color:var(--lt);line-height:1.6}
  .lib-vlink{display:inline-flex;align-items:center;gap:6px;color:#ff6584;border:1px solid var(--lbr);border-radius:6px;padding:6px 12px;font-size:13px;text-decoration:none;margin-top:2px}
  .lib-vlink:hover{border-color:#ff6584}
  .lib-mab{background:var(--la);border:none;color:#fff;border-radius:6px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
  .lib-mab:hover{opacity:.9}
  .lib-alt-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background .1s;border:1px solid var(--lbr);margin-bottom:5px}
  .lib-alt-row:hover{background:var(--ls2);border-color:var(--la)}
  .lib-alt-name{font-size:13px;font-weight:600;color:var(--lt)}
  .lib-alt-eq{font-size:11px;color:var(--lt2);margin-top:2px}
  /* section picker */
  #libPicker{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;align-items:center;justify-content:center;padding:20px}
  #libPicker.open{display:flex}
  .lib-pk{background:#fff;border-radius:12px;padding:22px;max-width:360px;width:100%}
  .lib-pk h3{margin-bottom:6px;font-size:16px;color:#1a3a6b}
  .lib-pk p{font-size:12px;color:#8a96a3;margin-bottom:14px}
  .lib-pk select{width:100%;padding:8px;border:1px solid var(--gray-300);border-radius:6px;font-size:14px;margin-bottom:14px;outline:none}
  .lib-pk-btns{display:flex;gap:8px}
  .lib-pk-btns button{flex:1;border-radius:6px;padding:9px;cursor:pointer;font-size:14px;font-weight:600;border:none}
  /* mobile filter */
  #libFiltOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
  #libFiltOverlay.open{display:block}
  .lib-mfbtn{display:none;align-items:center;gap:6px;background:var(--ls2);border:1px solid var(--lbr);color:var(--lt);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px}
  .lib-fbadge{background:var(--la);color:#fff;border-radius:10px;padding:1px 5px;font-size:10px;font-weight:700}
  @media(max-width:768px){
    .lib-sidebar{position:fixed;bottom:0;left:0;right:0;width:100%;max-height:82vh;min-width:0;border-right:none;border-top:1px solid var(--lbr);border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:200;overflow-y:auto}
    .lib-sidebar.open{transform:translateY(0)}
    .lib-mfbtn{display:flex}
    .lib-grid{grid-template-columns:1fr}
    .lib-tc{display:none}
    .lib-header-count{display:none}
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="app-header">
  <div class="logo">NASM <span>OPT</span> Builder</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('week')">📅 Week Planner</button>
    <button class="nav-tab" onclick="showView('library')">📋 Workout Library</button>
    <button class="nav-tab" id="builder-tab" onclick="showView('builder')" style="display:none">✏️ Edit Workout</button>
    <button class="nav-tab" onclick="showView('exercises')">📚 Exercise Library</button>
  </div>
  <div id="auth-area" style="margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0">
    <span id="auth-user" style="font-size:13px;color:rgba(255,255,255,0.75);white-space:nowrap;overflow:hidden;max-width:160px;text-overflow:ellipsis"></span>
    <button id="auth-btn" onclick="toggleAuth()" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.35);border-radius:6px;padding:5px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap">Sign In with Google</button>
  </div>
</div>

<div id="app-content">

  <!-- WEEK PLANNER -->
  <div id="view-week" class="view active">
    <div class="week-header">
      <h2>Week Planner</h2>
      <div class="week-nav">
        <button class="btn-icon" onclick="changeWeek(-1)">&#8592;</button>
        <div class="week-label" id="week-label"></div>
        <button class="btn-icon" onclick="changeWeek(1)">&#8594;</button>
        <button class="btn btn-secondary btn-sm" onclick="changeWeek(0)" style="margin-left:4px">Today</button>
      </div>
    </div>
    <div class="week-grid" id="week-grid"></div>
  </div>

  <!-- WORKOUT LIBRARY -->
  <div id="view-library" class="view">
    <div class="library-header">
      <h2>Workout Library</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-secondary btn-sm" onclick="exportData()" title="Copy all workouts as text to transfer to another device">📤 Export</button>
        <button class="btn btn-secondary btn-sm" onclick="showImport()" title="Paste exported data to load workouts on this device">📥 Import</button>
        <button class="btn btn-primary" onclick="newWorkout()">+ New Workout</button>
      </div>
    </div>
    <div id="import-panel" style="display:none;background:white;border:1px solid var(--gray-300);border-radius:10px;padding:16px;margin-bottom:20px;">
      <p style="font-size:13px;color:var(--gray-700);margin-bottom:10px;">Paste exported data below and click Load:</p>
      <textarea id="import-text" rows="4" style="width:100%;border:1px solid var(--gray-300);border-radius:6px;padding:8px;font-size:12px;font-family:monospace;resize:vertical;outline:none;" placeholder="Paste your exported data here..."></textarea>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-primary btn-sm" onclick="importData()">Load Data</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('import-panel').style.display='none'">Cancel</button>
      </div>
    </div>
    <div class="workout-grid" id="workout-grid"></div>
  </div>

  <!-- WORKOUT BUILDER -->
  <div id="view-builder" class="view">
    <div class="builder-topbar">
      <div class="field-group" style="flex:2">
        <label>Client Name</label>
        <input type="text" id="b-client" placeholder="e.g. John Smith" oninput="markDirty()">
      </div>
      <div class="field-group" style="flex:2">
        <label>Goal</label>
        <select id="b-goal" onchange="markDirty(); updateGoalContext()">
          <option value="">Select Goal...</option>
          <option value="Fat Loss">Fat Loss</option>
          <option value="Muscle Gain">Muscle Gain</option>
          <option value="Sport Performance">Sport Performance</option>
        </select>
      </div>
      <div class="field-group">
        <label>OPT Phase</label>
        <select id="b-phase" onchange="markDirty(); updatePhaseContext()">
          <option value="1">Phase 1 – Stabilization Endurance</option>
          <option value="2">Phase 2 – Strength Endurance</option>
          <option value="3">Phase 3 – Muscular Development</option>
          <option value="4">Phase 4 – Maximal Strength</option>
          <option value="5">Phase 5 – Power</option>
        </select>
      </div>
      <div class="field-group">
        <label>Date</label>
        <input type="date" id="b-date" oninput="markDirty()">
      </div>
      <div class="field-group" style="flex:2;position:relative">
        <label>Setting / Equipment</label>
        <button id="b-setting-btn" onclick="toggleEquipPanel(event)">
          <span id="b-setting-label">🏋️ Full Gym</span>
          <span style="color:var(--gray-400);font-size:11px">▼</span>
        </button>
        <div id="b-setting-panel" style="display:none">
          <div class="equip-presets" id="equip-presets"></div>
          <div class="equip-chip-grid" id="equip-chip-grid"></div>
          <label class="equip-impact-row">
            <input type="checkbox" id="equip-impact" onchange="onEquipImpactChange()"> Allow jumping / plyometrics
          </label>
        </div>
      </div>
      <div class="builder-actions">
        <button class="btn btn-success" onclick="saveWorkout()">💾 Save</button>
        <button class="btn btn-outline" onclick="printWorkout()">🖨 Export PDF</button>
        <button class="btn btn-secondary" onclick="showView('library')">← Library</button>
      </div>
      <div class="injury-chip-row">
        <label>Injuries / Limitations <span style="font-size:10px;font-weight:400;text-transform:none;color:var(--gray-400)">&nbsp;exercises contraindicated for active injuries are hidden when swapping</span></label>
        <div class="injury-chips" id="injury-chips"></div>
      </div>
    </div>

    <div id="phase-context" style="background:#e8f0fe;border:1px solid #a0b4e8;border-radius:8px;padding:10px 16px;margin-bottom:10px;font-size:13px;color:#1a3a6b;"></div>
    <div id="setting-context" style="background:#fff4e6;border:1px solid #f0c088;border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:#8a4b00;"></div>

    <div id="workout-sections"></div>

    <div style="background:white;border-radius:10px;border:1px solid var(--gray-200);padding:16px;margin-top:16px;">
      <label style="font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:8px;">Coaching Tips</label>
      <textarea id="b-coaching" rows="3" style="width:100%;border:1px solid var(--gray-300);border-radius:6px;padding:8px;font-size:13px;resize:vertical;outline:none;font-family:inherit;" placeholder="Session notes, cues, reminders..." oninput="markDirty()"></textarea>
    </div>
  </div>

</div>

<!-- EXERCISE LIBRARY VIEW -->
<div id="view-exercises" class="view">
  <div class="lib-header">
    <input id="libSearchBox" type="text" placeholder="Search exercises, muscles, notes…" autocomplete="off">
    <span class="lib-header-count"><b id="libVisibleCount">0</b> of <b id="libTotalCount">0</b> exercises</span>

  const cfg = (typeof setting === 'string') ? (SETTINGS[setting] || SETTINGS['Full Gym']) : setting;

    const equipArr = Array.isArray(cfg.equip) ? cfg.equip : [];

// ===== STORAGE =====
function saveState() {
  try { localStorage.setItem('nasm_opt_v1', JSON.stringify({ workouts: state.workouts, weekPlans: state.weekPlans })); } catch(e) {}
  saveToFirestore();
}
function loadState() {
  try {
    const raw = localStorage.getItem('nasm_opt_v1');
    if (raw) { const s = JSON.parse(raw); state.workouts = s.workouts||{}; state.weekPlans = s.weekPlans||{}; }
  } catch(e) {}
}
function generateId() { return 'w_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

// ===== WEEK UTILITIES =====
function getWeekKey(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset * 7);
  const y = d.getFullYear(); const s = new Date(y,0,1);
  const w = Math.ceil(((d-s)/86400000 + s.getDay()+1)/7);
  return `${y}-W${String(w).padStart(2,'0')}`;
}
function getWeekDates(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset*7);
  const day = d.getDay(); d.setDate(d.getDate() + (day===0?-6:1-day));
  return ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((label,i) => {
    const dd = new Date(d); dd.setDate(d.getDate()+i); return { label, date: dd, key: label };
  });
}
function getWeekLabel(offset) {
  const days = getWeekDates(offset);
  const fmt = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${fmt(days[0].date)} – ${fmt(days[6].date)}, ${days[0].date.getFullYear()}`;
}

// ===== VIEW ROUTER =====
function showView(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(el=>{
    if(el.getAttribute('onclick')&&el.getAttribute('onclick').includes("'"+v+"'")) el.classList.add('active');
  });
  try { localStorage.setItem('nasm_opt_last_view', v); } catch(e) {}
  if(v==='week') renderWeek();
  if(v==='library') renderLibrary();
  if(v==='builder') renderBuilder();
  if(v==='exercises') { if(!libInited){libInit();libInited=true;}else libApply(); }
}

// ===== WEEK PLANNER =====
function changeWeek(dir) {
  if(dir===0) state.currentWeekOffset=0; else state.currentWeekOffset+=dir;
  renderWeek();
}
function renderWeek() {
  document.getElementById('week-label').textContent = getWeekLabel(state.currentWeekOffset);
  const weekKey = getWeekKey(state.currentWeekOffset);
  const days = getWeekDates(state.currentWeekOffset);
  const plan = state.weekPlans[weekKey]||{};
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  days.forEach(({label,date,key}) => {
    const assigned = plan[key]||[];
    const isToday = date.toDateString()===new Date().toDateString();
    const card = document.createElement('div');
    card.className = 'day-card'+(assigned.length>0?' has-workout':'');
    card.innerHTML = `
      <div class="day-header" ${isToday?'style="background:#f0a040"':''}>
        <span>${label}</span><span class="date-num">${date.getDate()}</span>
      </div>
      <div class="day-body">
        ${assigned.map(wid=>{
          const w=state.workouts[wid]; if(!w) return '';
          return `<div class="day-workout-pill" onclick="openWorkoutFromDay('${wid}')">
            <span class="pill-name">${w.name||'Unnamed'}</span>
            <span class="pill-phase">Ph ${w.phase}</span>
            <span class="pill-remove" onclick="event.stopPropagation();removeFromDay('${weekKey}','${key}','${wid}')">&#x2715;</span>
          </div>`;
        }).join('')}
        ${assigned.length===0?'<div class="day-rest">Rest Day</div>':''}
        <div class="day-add-btn" onclick="openAssignModal('${weekKey}','${key}')">+ Add Workout</div>
      </div>`;
    grid.appendChild(card);
  });
}
function openWorkoutFromDay(wid) {
  state.currentWorkoutId=wid;
  document.getElementById('builder-tab').style.display='inline-flex';
  showView('builder');
}
function removeFromDay(weekKey,dayKey,wid) {
  if(!state.weekPlans[weekKey]) return;
  state.weekPlans[weekKey][dayKey]=(state.weekPlans[weekKey][dayKey]||[]).filter(id=>id!==wid);
  saveState(); renderWeek();
}

// ===== ASSIGN MODAL =====
function openAssignModal(weekKey,dayKey) {
  assignState={weekKey,dayKey};
  const list=document.getElementById('assign-list');
  const userWorkouts=Object.values(state.workouts).filter(w=>!w.id.startsWith('prog_')).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  const progGroups=[
    {prefix:'prog_fl_', label:'🔥 Fat Loss Program'},
    {prefix:'prog_mg_', label:'💪 Muscle Gain Program'},
    {prefix:'prog_sp_', label:'⚡ Sport Performance Program'},
  ];
  const assignItem=(w,isTemplate)=>`
    <div class="assign-item" onclick="assignWorkout('${w.id}')">
      <div><div class="ai-name">${w.name||'Unnamed Workout'}${isTemplate?' <span style="font-size:10px;color:var(--accent);font-weight:700">TEMPLATE → copy</span>':''}</div>
      <div class="ai-meta">Phase ${w.phase} · ${w.goal||'No goal'}</div></div>
      <span class="pill-phase">Ph ${w.phase}</span>
    </div>`;
  let html='';
  if(userWorkouts.length>0){
    html+=`<div class="assign-group-label">My Workouts</div>${userWorkouts.map(w=>assignItem(w,false)).join('')}`;
  }
  progGroups.forEach(g=>{
    const ws=[];
    for(let i=1;i<=12;i++){const w=state.workouts[g.prefix+'w'+i];if(w)ws.push(w);}
    if(ws.length===0)return;
    html+=`<div class="assign-group-label">${g.label}</div>${ws.map(w=>assignItem(w,true)).join('')}`;
  });
  if(!html) html='<div class="no-results" style="padding:30px">No saved workouts yet.<br><br><button class="btn btn-primary" onclick="closeAssign();newWorkout()">+ Create New Workout</button></div>';
  list.innerHTML=html;
  document.getElementById('assign-title').textContent=`Assign to ${dayKey}`;
  document.getElementById('assign-modal').classList.add('open');
}
function closeAssign() { document.getElementById('assign-modal').classList.remove('open'); }
function assignWorkout(wid) {
  const {weekKey,dayKey}=assignState;
  // Auto-copy program templates so users always edit their own version
  if (wid.startsWith('prog_')) {
    const orig = state.workouts[wid];
    const newId = generateId();
    const copy = JSON.parse(JSON.stringify(orig));
    copy.id = newId; copy.date = ''; copy.createdAt = copy.updatedAt = Date.now();
    state.workouts[newId] = copy;
    wid = newId;
    toast('Template copied to your workouts!');
  }
  if(!state.weekPlans[weekKey]) state.weekPlans[weekKey]={};
  if(!state.weekPlans[weekKey][dayKey]) state.weekPlans[weekKey][dayKey]=[];
  if(!state.weekPlans[weekKey][dayKey].includes(wid)) state.weekPlans[weekKey][dayKey].push(wid);
  saveState(); closeAssign(); renderWeek();
}

// ===== WORKOUT LIBRARY =====
function workoutCardHTML(w) {
  const isTemplate = w.id.startsWith('prog_');
  const sectionCounts={};
  SECTIONS.forEach(s=>{ const c=(w.exercises[s.id]||[]).length; if(c>0) sectionCounts[s.label]=c; });
  const totalEx=Object.values(sectionCounts).reduce((a,b)=>a+b,0);
  const sectionTags=Object.keys(sectionCounts).slice(0,3).map(s=>{
    const short=s.replace('Activation (Core & Balance)','Activation').replace('Skill Development (Plyometric & SAQ)','Skill Dev').replace("Client's Choice","Client's Choice");
    return `<span class="wc-section-tag">${short}</span>`;
  }).join('');
  const actions = isTemplate
    ? `<button class="btn btn-accent btn-sm" onclick="useTemplate('${w.id}')">▶ Use as Template</button>`
    : `<button class="btn btn-primary btn-sm" onclick="editWorkout('${w.id}')">✏️ Edit</button>
       <button class="btn btn-outline btn-sm" onclick="duplicateWorkout('${w.id}')">📋 Duplicate</button>
       <button class="btn btn-danger btn-sm" onclick="deleteWorkout('${w.id}')">🗑</button>`;
  return `<div class="workout-card${isTemplate?' template-card':''}">
    <div class="workout-card-header">
      <div class="wc-name">${w.name||'Unnamed Workout'}</div>
      <div class="wc-meta"><span>Phase ${w.phase}</span>${w.goal?`<span>${w.goal}</span>`:''}${isTemplate?'<span class="wc-template-badge">Template</span>':''}</div>
    </div>
    <div class="workout-card-body">
      <div class="wc-sections">${sectionTags||'<span style="color:var(--gray-500);font-size:12px">No exercises yet</span>'}</div>
      <div class="wc-exercise-count">${totalEx} exercise${totalEx!==1?'s':''}</div>
    </div>
    <div class="workout-card-actions">${actions}</div>
  </div>`;
}

const PROG_GROUPS = [
  { key: 'fl', prefix: 'prog_fl_', label: '🔥 Fat Loss',          fullLabel: '🔥 Fat Loss | 12-Workout Program' },
  { key: 'mg', prefix: 'prog_mg_', label: '💪 Muscle Gain',        fullLabel: '💪 Muscle Gain | 12-Workout Program' },
  { key: 'sp', prefix: 'prog_sp_', label: '⚡ Sport Performance',   fullLabel: '⚡ Sport Performance | 12-Workout Program' },
];
let activeProgram = 'fl';

function renderLibrary() {
  const grid = document.getElementById('workout-grid');

  const userWorkouts = Object.values(state.workouts)
    .filter(w => !w.id.startsWith('prog_'))
    .sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));

  const activeGroup = PROG_GROUPS.find(g => g.key === activeProgram);
  const programWorkouts = [];
  for (let i = 1; i <= 12; i++) {
    const w = state.workouts[activeGroup.prefix + 'w' + i];
    if (w) programWorkouts.push(w);
  }

  const filterButtons = PROG_GROUPS.map(g => `
    <button class="prog-filter-btn${g.key === activeProgram ? ' active' : ''}" onclick="setActiveProgram('${g.key}')">${g.label}</button>
  `).join('');

  let html = `
    <div class="library-section">
      <div class="library-section-header"><h3>My Workouts</h3></div>
      <div class="workout-grid">
        <div class="new-workout-card" onclick="newWorkout()"><div class="plus">+</div><div class="label">New Workout</div></div>
        ${userWorkouts.map(w => workoutCardHTML(w)).join('')}
        ${userWorkouts.length === 0 ? '<div class="wc-empty">No workouts yet — create one above or use a program template below.</div>' : ''}
      </div>
    </div>
    <div class="library-section">
      <div class="library-section-header">
        <h3>Program Templates</h3>
        <span class="library-section-sub">Read-only — click "Use as Template" to create an editable copy</span>
      </div>
      <div class="prog-filter-bar">${filterButtons}</div>
      <div class="prog-filter-label">${activeGroup.fullLabel}</div>
      <div class="workout-grid">${programWorkouts.map(w => workoutCardHTML(w)).join('')}</div>
    </div>`;

  grid.innerHTML = html;
}

function setActiveProgram(key) {
  activeProgram = key;
  renderLibrary();
}

function useTemplate(id) {
  const orig = state.workouts[id]; if (!orig) return;
  const newId = generateId();
  const copy = JSON.parse(JSON.stringify(orig));
  copy.id = newId;
  copy.name = orig.name.replace(/ — /, ' ').replace(/Ph\d+ /, ''); // strip "Ph1 " prefix
  copy.date = new Date().toISOString().slice(0,10);
  copy.createdAt = copy.updatedAt = Date.now();
  state.workouts[newId] = copy;
  saveState();
  state.currentWorkoutId = newId;
  document.getElementById('builder-tab').style.display = 'inline-flex';
  showView('builder');
  toast('Template copied — now editing your version!');
}
function newWorkout() {

// ===== EQUIPMENT PANEL =====
function toggleEquipPanel(e) {
  e.stopPropagation();
  const panel = document.getElementById('b-setting-panel');
  if (panel.style.display === 'none') {
    equipPanelInit();
    panel.style.display = 'block';
    // On narrow screens the panel is position:fixed; set top from the button's viewport position
    if (window.innerWidth <= 640) {
      const r = document.getElementById('b-setting-btn').getBoundingClientRect();
      panel.style.top = (r.bottom + 4) + 'px';
    }
    setTimeout(() => document.addEventListener('click', closeEquipPanelOutside), 0);
  } else {
    panel.style.display = 'none';
    panel.style.top = '';
    document.removeEventListener('click', closeEquipPanelOutside);
  }
}
function closeEquipPanelOutside(e) {
  const panel = document.getElementById('b-setting-panel');
  const btn = document.getElementById('b-setting-btn');
  if (!panel || panel.contains(e.target) || btn.contains(e.target)) return;
  panel.style.display = 'none';
  document.removeEventListener('click', closeEquipPanelOutside);
}
function equipPanelInit() {
  const allEquip = Object.keys(LIB_EQ);
  const activeSet = workoutEquipCfg.equip === 'ALL' ? new Set(allEquip) : new Set(workoutEquipCfg.equip);
  // Presets
  document.getElementById('equip-presets').innerHTML = Object.entries(SETTINGS).map(([name, cfg]) => {
    const short = name.replace(/ \(.+\)/, '');
    return `<button class="equip-preset-btn${workoutPresetName===name?' active':''}" onclick='loadEquipPreset(${JSON.stringify(name)})'>${cfg.icon} ${short}</button>`;
  }).join('');
  // Equipment chips
  document.getElementById('equip-chip-grid').innerHTML = allEquip.map(eq =>
    `<div class="equip-chip${activeSet.has(eq)?' active':''}" onclick="toggleEquipItem('${eq}',this)">${LIB_EQ[eq]||eq}</div>`
  ).join('');
  document.getElementById('equip-impact').checked = workoutEquipCfg.allowImpact;
}
function loadEquipPreset(name) {
  const cfg = SETTINGS[name]; if (!cfg) return;
  workoutPresetName = name;
  workoutEquipCfg = { equip: cfg.equip, allowImpact: cfg.allowImpact };
  equipPanelInit();
  onEquipChanged();
}
function toggleEquipItem(eq, el) {
  const allEquip = Object.keys(LIB_EQ);
  const activeSet = workoutEquipCfg.equip === 'ALL' ? new Set(allEquip) : new Set(workoutEquipCfg.equip);
  if (activeSet.has(eq)) { activeSet.delete(eq); } else { activeSet.add(eq); }
  workoutEquipCfg = { equip: [...activeSet], allowImpact: workoutEquipCfg.allowImpact };
  workoutPresetName = getMatchingPreset() || 'Custom';
  el.classList.toggle('active');
  document.querySelectorAll('.equip-preset-btn').forEach(b => b.classList.toggle('active', b.textContent.trim().includes(workoutPresetName.replace(/ \(.+\)/,''))));
  onEquipChanged();
}
function onEquipImpactChange() {
  workoutEquipCfg = { equip: workoutEquipCfg.equip, allowImpact: document.getElementById('equip-impact').checked };
  workoutPresetName = getMatchingPreset() || workoutPresetName;
  onEquipChanged();
}
function onEquipChanged() {
  updateEquipLabel(); markDirty(); updateSettingContext();
}
function updateEquipLabel() {
  const icon = (SETTINGS[workoutPresetName]?.icon) || '⚙️';
  const label = workoutPresetName === 'Custom'
    ? `⚙️ Custom (${workoutEquipCfg.equip === 'ALL' ? 'All' : workoutEquipCfg.equip.length} items)`
    : `${icon} ${workoutPresetName.replace(/ \(.+\)/, '')}`;
  document.getElementById('b-setting-label').textContent = label;
}
function getMatchingPreset() {
  const eq = workoutEquipCfg.equip;
  const imp = workoutEquipCfg.allowImpact;
  for (const [name, cfg] of Object.entries(SETTINGS)) {
    if (cfg.equip === 'ALL' && eq === 'ALL' && cfg.allowImpact === imp) return name;
    if (Array.isArray(cfg.equip) && Array.isArray(eq) && cfg.equip.length === eq.length
        && cfg.equip.every(e => eq.includes(e)) && cfg.allowImpact === imp) return name;
  }
  return null;
}
function initInjuryChips() {
  const w = getWorkout();
  const active = new Set(w ? (w.injuries || []) : []);
  document.getElementById('injury-chips').innerHTML = Object.entries(INJURY_LABELS).map(([key, label]) =>
    `<div class="injury-chip${active.has(key)?' active':''}" onclick="toggleInjury('${key}',this)">${label}</div>`
  ).join('');
}
function toggleInjury(key, el) {
  const w = getWorkout(); if (!w) return;
  if (!w.injuries) w.injuries = [];
  const idx = w.injuries.indexOf(key);
  if (idx >= 0) w.injuries.splice(idx, 1); else w.injuries.push(key);
  el.classList.toggle('active');
  markDirty();

function updateGoalContext() {
  const goal=document.getElementById('b-goal').value;
  const phaseSelect=document.getElementById('b-phase');
  // Phase restrictions per goal
  const GOAL_PHASES={
    'Fat Loss':          [1,2,3],
    'Muscle Gain':       [1,2,3,4],
    'Sport Performance': [1,2,5],
  };
  const allowed=GOAL_PHASES[goal]||[1,2,3,4,5];
  Array.from(phaseSelect.options).forEach(opt=>{
    const ph=parseInt(opt.value);

// ===== EXERCISE PICKER =====
function openPicker(sectionId, swapIdx=null, swapMuscles='', swapExId='') {
  const w = getWorkout();
  // Resolve ID by name when empty (program template exercises have id:'')
  let effectiveId = swapExId;
  if (!effectiveId && swapIdx !== null && w && w.exercises[sectionId]?.[swapIdx]) {
    const exName = w.exercises[sectionId][swapIdx].name;
    const lib = EXERCISE_LIBRARY.find(e => e.name === exName);
    if (lib) effectiveId = lib.id;
    if (!swapMuscles && lib) swapMuscles = lib.muscles || '';
  }
  const phase = parseInt(document.getElementById('b-phase').value);
  pickerState = {
    sectionId, activeSub:null, searchTerm:'', swapIdx,
    swapMuscles:swapMuscles||'', swapExId:effectiveId||'',
    phases: swapIdx !== null ? new Set([phase]) : new Set(),
    equip: new Set(),
  };
  // Update picker title
  document.getElementById('picker-title').textContent = swapIdx !== null ? 'Swap Exercise — find a replacement' : 'Add Exercise';
  // Show/hide swap info banner
  const infoDiv = document.getElementById('picker-swap-info');
  if (swapIdx !== null && w && w.exercises[sectionId]?.[swapIdx]) {
    const ex = w.exercises[sectionId][swapIdx];
    const lib = effectiveId ? EXERCISE_LIBRARY.find(e => e.id === effectiveId) : null;
    const muscles = swapMuscles || (lib ? lib.muscles : '') || ex.muscles || '';
    document.getElementById('picker-swap-name').textContent = 'Replacing: ' + ex.name;
    document.getElementById('picker-swap-muscles').textContent = muscles ? 'Targets: ' + muscles : '';
    infoDiv.style.display = 'block';
  } else {
    infoDiv.style.display = 'none';
  }
  document.getElementById('picker-search').value='';
  renderPickerChips(sectionId); renderPickerSidebar(sectionId); renderPickerList(sectionId);
  document.getElementById('exercise-picker-modal').classList.add('open');
  setTimeout(()=>document.getElementById('picker-search').focus(),100);
}
function renderPickerChips(sectionId) {
  const secExercises = EXERCISE_LIBRARY.filter(e => e.section === sectionId);
  const eqs = [...new Set(secExercises.flatMap(e => e.equipment||[]))].sort();
  const row = document.getElementById('picker-filter-row');
  let html = '';
  html += '<span class="picker-chip-label">Phase</span>';
  for (let p = 1; p <= 5; p++) {
    if (secExercises.some(e => (e.phases||[]).includes(p))) {
      html += `<div class="picker-chip" id="pchip-p${p}" onclick="pickerTogglePhase(${p},this)">Ph ${p}</div>`;
    }
  }
  if (eqs.length) {
    html += '<span class="picker-chip-label" style="margin-left:6px">Equipment</span>';
    eqs.forEach(eq => {
      html += `<div class="picker-chip" id="pchip-e${eq}" onclick="pickerToggleEquip('${eq}',this)">${LIB_EQ[eq]||eq}</div>`;
    });
  }

}
function pickerTogglePhase(p, el) {

  el.classList.toggle('active');
  renderPickerList(pickerState.sectionId);

function pickerToggleEquip(eq, el) {

function closePicker() { document.getElementById('exercise-picker-modal').classList.remove('open'); }
function renderPickerSidebar(sectionId) {

  document.getElementById('picker-sidebar').innerHTML=
    `<div class="modal-sidebar-item ${!pickerState.activeSub?'active':''}" onclick="setPickerSub(null)">All Exercises</div>`+

}
function setPickerSub(sub) { pickerState.activeSub=sub; renderPickerSidebar(pickerState.sectionId); renderPickerList(pickerState.sectionId); }
function setPickerSubStr(sub) { setPickerSub(sub); }
function filterExercises() { pickerState.searchTerm=document.getElementById('picker-search').value.toLowerCase(); renderPickerList(pickerState.sectionId); }
function renderPickerList(sectionId) {
  const phase=parseInt(document.getElementById('b-phase').value);
  const term=pickerState.searchTerm, sub=pickerState.activeSub;
  let exercises=EXERCISE_LIBRARY.filter(e=>e.section===sectionId);
  if(sub&&!term) exercises=exercises.filter(e=>e.sub===sub);
  if(term) exercises=exercises.filter(e=>e.name.toLowerCase().includes(term)||(e.muscles||'').toLowerCase().includes(term)||(e.sub||'').toLowerCase().includes(term));
  if(pickerState.phases&&pickerState.phases.size>0) exercises=exercises.filter(e=>(e.phases||[]).some(p=>pickerState.phases.has(p)));
  if(pickerState.equip&&pickerState.equip.size>0) exercises=exercises.filter(e=>(e.equipment||[]).some(q=>pickerState.equip.has(q)));
  const setting=currentSetting();
  const isSwap=pickerState.swapIdx!==null&&pickerState.swapIdx!==undefined;
  if(isSwap){
    // In swap mode: hide what you can't do and hide injury-contraindicated exercises
    exercises=exercises.filter(e=>checkExerciseSetting(e,setting).ok);
    const w=getWorkout();
    const activeInjuries=(w?.injuries)||[];
    if(activeInjuries.length>0){
      const contraIDs=new Set(activeInjuries.flatMap(inj=>INJURY_CONTRAINDICATIONS[inj]||[]));
      exercises=exercises.filter(e=>!contraIDs.has(e.id));
    }
  }
  const w=getWorkout();
  const usedIds=w?new Set(Object.values(w.exercises||{}).flat().map(e=>e.id)):new Set();
  const swapWords=(pickerState.swapMuscles||'').toLowerCase().split(/[,\s]+/).filter(x=>x.length>2);
  // Graded muscle overlap: count of matching words (not binary)
  const muscleScore=ex=>{ if(!swapWords.length) return 0; const m=(ex.muscles||'').toLowerCase(); return swapWords.filter(w=>m.includes(w)).length; };
  const score=ex=>{
    const phaseM=ex.phases.includes(phase)?1:0;
    return muscleScore(ex)*10 + phaseM;
  };
  exercises.sort((a,b)=>score(b)-score(a));
  const list=document.getElementById('picker-list');
  if(!exercises.length){ list.innerHTML='<div class="no-results">No exercises found.</div>'; return; }
  const renderItem=(ex)=>{
    const match=ex.phases.includes(phase);
    const alreadyAdded=usedIds.has(ex.id);
    const phaseBadge=match?`<span class="modal-phase-badge">&#10003; Phase ${phase}</span>`:`<span style="color:var(--gray-500);font-size:11px">Ph ${(ex.phases||[]).join(',')}</span>`;
    const addedBadge=alreadyAdded?`<span class="ex-added-badge">✓ Added</span>`:'';
    const opacity=alreadyAdded?'opacity:0.45':'';
    return `<div class="modal-ex-item${alreadyAdded?' ex-already-added':''}" style="${opacity}" onclick="addExercise('${ex.id}')">
      <div style="flex:1;min-width:0"><div class="modal-ex-name">${esc(ex.name)}</div><div class="modal-ex-meta">${esc(ex.sub||'')}${ex.muscles?' · '+esc(ex.muscles):''}</div></div>
      <div class="modal-ex-right">${addedBadge}${phaseBadge}<button class="ex-pick-info" onclick="event.stopPropagation();libEnsureInit();libOpenModal('${ex.id}')" title="View exercise details">ⓘ</button></div>
    </div>`;
  };
  // Curated alternatives group
  const curatedIds=(isSwap&&pickerState.swapExId)?EXERCISE_ALTERNATIVES[pickerState.swapExId]||[]:[];
  const exIdSet=new Set(exercises.map(e=>e.id));
  const curatedExs=curatedIds.map(id=>EXERCISE_LIBRARY.find(e=>e.id===id)).filter(e=>e&&exIdSet.has(e.id));
  let html='';
  if(curatedExs.length>0){
    html+=`<div class="picker-group-label">⭐ Recommended Alternatives</div>`;
    html+=curatedExs.map(renderItem).join('');
    const curatedSet=new Set(curatedExs.map(e=>e.id));
    const rest=exercises.filter(e=>!curatedSet.has(e.id));
    if(rest.length>0){
      html+=`<div class="picker-group-label" style="margin-top:8px">All Options</div>`;
      html+=rest.map(renderItem).join('');
    }
  } else {
    html=exercises.map(renderItem).join('');
  }
  list.innerHTML=html;
}
function addExercise(exId) {
  const ex=EXERCISE_LIBRARY.find(e=>e.id===exId); if(!ex) return;
  const w=getWorkout(); if(!w) return;
  const sectionId=pickerState.sectionId;
  const phase=parseInt(document.getElementById('b-phase').value);
  const defaults=PHASE_DEFAULTS[phase][sectionId]||{};
  const swapIdx=pickerState.swapIdx;
  if(swapIdx!==null&&swapIdx!==undefined&&w.exercises[sectionId][swapIdx]){
    // Preserve the trainer's existing sets/reps/tempo/rest; swap the movement + muscles + default note.
    const prev=w.exercises[sectionId][swapIdx];
    w.exercises[sectionId][swapIdx]={ id:exId, name:ex.name, muscles:ex.muscles||'',
      sets:prev.sets||defaults.sets||'', reps:prev.reps||defaults.reps||'',
      tempo:prev.tempo||defaults.tempo||'', rest:prev.rest||defaults.rest||'', notes:ex.notes||'' };
    w.updatedAt=Date.now(); syncWorkoutHeader(); renderSections(); closePicker(); toast('Swapped in: '+ex.name);
    return;
  }
  w.exercises[sectionId].push({ id:exId, name:ex.name, muscles:ex.muscles||'', sets:defaults.sets||'', reps:defaults.reps||'', tempo:defaults.tempo||'', rest:defaults.rest||'', notes:ex.notes||'' });
  w.updatedAt=Date.now(); syncWorkoutHeader(); renderSections(); closePicker(); toast('Added: '+ex.name);
}

// ===== PDF EXPORT =====
function printWorkout() {
  syncWorkoutHeader(); const w=getWorkout(); if(!w) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'pt', format:'letter' });
  const PW = doc.internal.pageSize.getWidth();
  const NAVY=[26,58,107], BLUE=[74,123,196], BLUE_LIGHT=[214,228,247], WHITE=[255,255,255], GRAY=[74,85,104];
  const PHASE_LABELS={1:'Phase 1 – Stabilization Endurance',2:'Phase 2 – Strength Endurance',3:'Phase 3 – Muscular Development',4:'Phase 4 – Maximal Strength',5:'Phase 5 – Power Training'};

  // Header bar
  doc.setFillColor(...NAVY);
  doc.rect(0,0,PW,48,'F');
  doc.setTextColor(...WHITE);
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text('Optimum Performance Training®', 36, 30);
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text('NASM', PW-36, 30, {align:'right'});

  // Client info grid
  const infoY=48;
  const infoH=22;
  const cols=[[36,'CLIENT\'S NAME',w.client||''],[PW/2,'GOAL',w.goal||'']];
  const cols2=[[36,'PHASE',PHASE_LABELS[w.phase]||'Phase '+w.phase],[PW/2,'DATE',w.date||'']];
  [[cols,infoY],[cols2,infoY+infoH]].forEach(([row,y])=>{
    doc.setDrawColor(170,170,170);
    doc.setFillColor(...WHITE);
    doc.rect(36,y,PW-72,infoH,'FD');
    doc.line(PW/2,y,PW/2,y+infoH);
    row.forEach(([x,label,val])=>{
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(...GRAY);
      doc.text(label+': ', x+6, y+14);
      const lw=doc.getTextWidth(label+': ');
      doc.setFont('helvetica','normal'); doc.setTextColor(...[26,32,44]);
      doc.text(val, x+6+lw, y+14);
    });
  });

  // Exercise table
  const body=[];
  SECTIONS.forEach(sec=>{
    body.push([{content:sec.label, colSpan:6, styles:{fillColor:BLUE, textColor:WHITE, fontStyle:'bold', fontSize:9}}]);
    const exs=w.exercises[sec.id]||[];
    if(exs.length===0){
      body.push([{content:'', colSpan:6, styles:{minCellHeight:16}}]);
    } else {
      exs.forEach(ex=>{
        body.push([ex.name+(ex.notes?'\n'+ex.notes:''), ex.sets||'', ex.reps||'', ex.tempo||'', ex.rest||'', '']);
      });
    }
  });

  doc.autoTable({
    startY: infoY + infoH*2 + 8,
    margin:{left:36,right:36},
    head:[[
      {content:'EXERCISE', styles:{halign:'left'}},
      'SETS','REPS','TEMPO','REST',
      {content:'NOTES', styles:{halign:'left'}},
    ]],
    body,
    styles:{fontSize:8, cellPadding:4, lineColor:[200,200,200], lineWidth:0.5},
    headStyles:{fillColor:NAVY, textColor:WHITE, fontStyle:'bold', fontSize:8},
    columnStyles:{
      0:{cellWidth:155, halign:'left'},
      1:{cellWidth:38, halign:'center'},
      2:{cellWidth:38, halign:'center'},
      3:{cellWidth:65, halign:'center'},
      4:{cellWidth:55, halign:'center'},
      5:{halign:'left'},
    },
    alternateRowStyles:{fillColor:[249,251,253]},
  });

  // Coaching tips
  if(w.coaching){
    const finalY=doc.lastAutoTable.finalY+10;
    doc.setDrawColor(...NAVY); doc.setLineWidth(1.5);
    doc.line(36,finalY,PW-36,finalY);
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...NAVY);
    doc.text('Coaching Tips:', 36, finalY+14);
    doc.setFont('helvetica','normal'); doc.setTextColor(...GRAY);
    const lines=doc.splitTextToSize(w.coaching, PW-100);
    doc.text(lines, 120, finalY+14);
  }

  const filename=(w.name||'workout').replace(/[^a-z0-9]/gi,'_').toLowerCase()+'.pdf';
  doc.save(filename);
  toast('PDF downloaded!');
}

// ===== EXPORT / IMPORT =====
function exportData() {
  const data = JSON.stringify({ workouts: state.workouts, weekPlans: state.weekPlans });
  navigator.clipboard.writeText(data).then(() => {
    toast('Copied to clipboard! Paste it into the app on your other device.');
  }).catch(() => {
    // Fallback: show in a prompt
    const w = window.open('', '_blank', 'width=600,height=400');
    w.document.write('<textarea style="width:100%;height:90%;font-size:11px;font-family:monospace">' + data.replace(/</g,'&lt;') + '</textarea>');
    toast('Copy all the text from the new window, then paste it on your other device.');
  });
}
function showImport() {
  const panel = document.getElementById('import-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  if (panel.style.display === 'block') document.getElementById('import-text').focus();
}
function importData() {
  try {
    const raw = document.getElementById('import-text').value.trim();
    const parsed = JSON.parse(raw);
    if (!parsed.workouts) throw new Error('Invalid format');
    state.workouts = { ...state.workouts, ...parsed.workouts };
    if (parsed.weekPlans) {
      Object.keys(parsed.weekPlans).forEach(wk => {
        if (!state.weekPlans[wk]) state.weekPlans[wk] = {};
        Object.keys(parsed.weekPlans[wk]).forEach(day => {
          state.weekPlans[wk][day] = [...new Set([...(state.weekPlans[wk][day]||[]), ...parsed.weekPlans[wk][day]])];
        });
      });
    }
    saveState(); renderLibrary();
    document.getElementById('import-panel').style.display = 'none';
    document.getElementById('import-text').value = '';
    toast('Data imported! ' + Object.keys(parsed.workouts).length + ' workouts loaded.');
  } catch(e) {
    toast('Import failed — make sure you pasted the full exported text.');
  }
}

}

function migrateProgramNames() {
  // Rename any prog_ workouts with old naming to current "Goal | Workout N of 12" format.
  const PREFIX_MAP = {
    'prog_fl_': 'Fat Loss | Workout ',
    'prog_mg_': 'Muscle Gain | Workout ',
    'prog_sp_': 'Sport Performance | Workout ',
  };
  let changed = false;
  Object.values(state.workouts).forEach(w => {
    const entry = Object.entries(PREFIX_MAP).find(([k]) => w.id.startsWith(k));
    if (!entry) return;
    const num = parseInt(w.id.replace(/.*_w/, ''));
    if (!num) return;
    const expected = entry[1] + num + ' of 12';
    if (w.name !== expected) { w.name = expected; changed = true; }
  });
  if (changed) saveState();
}

function toggleAuth() {
  if (currentUser) {
    auth.signOut();
  } else {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(e => toast('Sign-in failed: ' + e.message));
  }
}

auth.onAuthStateChanged(user => {
  currentUser = user;
  const btn = document.getElementById('auth-btn');
  const userEl = document.getElementById('auth-user');
  if (user) {
    btn.textContent = 'Sign Out';
    userEl.textContent = user.displayName || user.email;
    toast('Signed in as ' + (user.displayName || user.email));
    subscribeFirestore();
  } else {
    btn.textContent = 'Sign In with Google';
    userEl.textContent = '';
    if (firestoreUnsubscribe) { firestoreUnsubscribe(); firestoreUnsubscribe = null; }
  }
});

function subscribeFirestore() {
  if (firestoreUnsubscribe) firestoreUnsubscribe();
  firestoreUnsubscribe = db.collection('users').doc(currentUser.uid)
    .onSnapshot(doc => {
      if (doc.exists) {
        const data = doc.data();
        state.workouts = data.workouts || {};
        state.weekPlans = data.weekPlans || {};
        // Re-seed program library if the cloud copy is missing it (idempotent).
        // Without this, the cloud snapshot overwrites the locally-seeded
        // program workouts on every load for signed-in users.
        seedProgramLibrary();
        migrateProgramNames();
        try { localStorage.setItem('nasm_opt_v1', JSON.stringify({ workouts: state.workouts, weekPlans: state.weekPlans })); } catch(e) {}
        renderWeek();
        if (document.getElementById('view-library').classList.contains('active')) renderLibrary();
      } else {
        // First-time signed-in user with no cloud doc yet: push the locally
        // seeded state (including the program library) up to Firestore.
        seedProgramLibrary();
        saveToFirestore();
      }
    }, err => console.error('Firestore error:', err));
}

function saveToFirestore() {
  if (!currentUser) return;
  db.collection('users').doc(currentUser.uid).set({
    workouts: state.workouts,
    weekPlans: state.weekPlans,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(e => console.error('Firestore save error:', e));
}
