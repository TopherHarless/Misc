<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NASM OPT Workout Builder</title>
<style>
  /* ===== BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1a3a6b;
    --navy-dark: #122a50;
    --navy-light: #2a5298;
    --blue-section: #4a7bc4;
    --blue-section-light: #d6e4f7;
    --accent: #e8861a;
    --white: #ffffff;
    --gray-100: #f5f7fa;
    --gray-200: #e8ecf0;
    --gray-300: #d0d7e0;
    --gray-500: #8a96a3;
    --gray-700: #4a5568;
    --text: #1a202c;
    --red: #e53e3e;
    --green: #38a169;
    --phase-badge: #e8f4d4;
    --phase-badge-text: #2d6a1e;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-100); color: var(--text); min-height: 100vh; }

  /* ===== APP SHELL ===== */
  #app-header {
    background: var(--navy);
    color: white;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 32px;
    height: 56px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #app-header .logo { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; }
  #app-header .logo span { color: #f0a040; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    color: rgba(255,255,255,0.7);
    padding: 6px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    border: none;
    background: none;
    white-space: nowrap;
  }
  .nav-tab:hover { color: white; background: rgba(255,255,255,0.12); }
  .nav-tab.active { color: white; background: rgba(255,255,255,0.2); }
  #app-content { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }

  /* ===== VIEWS ===== */
  .view { display: none; }
  .view.active { display: block; }

  /* ===== WEEK PLANNER ===== */
  .week-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .week-header h2 { font-size: 22px; font-weight: 700; color: var(--navy); }
  .week-nav { display: flex; align-items: center; gap: 12px; }
  .week-label { font-size: 15px; font-weight: 600; color: var(--navy); min-width: 180px; text-align: center; }
  .btn-icon { background: var(--white); border: 1px solid var(--gray-300); border-radius: 6px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--navy); transition: all 0.15s; }
  .btn-icon:hover { background: var(--blue-section-light); border-color: var(--navy-light); }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .day-card {
    background: var(--white);
    border-radius: 10px;
    border: 2px solid var(--gray-200);
    min-height: 160px;
    overflow: hidden;
    transition: border-color 0.15s;
    display: flex;
    flex-direction: column;
  }
  .day-card:hover { border-color: var(--navy-light); }
  .day-card.has-workout { border-color: var(--blue-section); }
  .day-header {
    background: var(--navy);
    color: white;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .day-header .date-num { font-size: 16px; font-weight: 700; }
  .day-body { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .day-workout-pill {
    background: var(--blue-section-light);
    border: 1px solid var(--blue-section);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
    transition: background 0.15s;
  }
  .day-workout-pill:hover { background: #c5d9f2; }
  .pill-name { font-weight: 600; color: var(--navy); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pill-phase { background: var(--navy); color: white; border-radius: 3px; padding: 1px 5px; font-size: 10px; font-weight: 700; white-space: nowrap; }
  .pill-remove { color: var(--gray-500); cursor: pointer; font-size: 14px; line-height: 1; flex-shrink: 0; }
  .pill-remove:hover { color: var(--red); }
  .day-add-btn {
    color: var(--gray-500);
    font-size: 12px;
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
    border: 1px dashed var(--gray-300);
    justify-content: center;
    transition: all 0.15s;
    margin-top: auto;
  }
  .day-add-btn:hover { color: var(--navy); border-color: var(--navy-light); background: var(--blue-section-light); }
  .day-rest { color: var(--gray-500); font-size: 12px; text-align: center; padding: 16px 0; font-style: italic; }

  /* ===== WORKOUT LIBRARY ===== */
  .library-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .library-header h2 { font-size: 22px; font-weight: 700; color: var(--navy); }
  .workout-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .workout-card {
    background: var(--white);
    border-radius: 10px;
    border: 2px solid var(--gray-200);
    overflow: hidden;
    transition: all 0.15s;
  }
  .workout-card:hover { border-color: var(--navy-light); box-shadow: 0 4px 16px rgba(26,58,107,0.12); transform: translateY(-1px); }
  .workout-card-header { background: var(--navy); color: white; padding: 14px 16px; }
  .workout-card-header .wc-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .workout-card-header .wc-meta { font-size: 12px; color: rgba(255,255,255,0.7); display: flex; gap: 12px; }
  .workout-card-body { padding: 14px 16px; }
  .wc-sections { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .wc-section-tag { background: var(--blue-section-light); color: var(--navy); border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .wc-exercise-count { color: var(--gray-500); font-size: 12px; }
  .workout-card-actions { padding: 10px 16px; border-top: 1px solid var(--gray-200); display: flex; gap: 8px; }
  .btn { border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy-light); }
  .btn-secondary { background: var(--gray-200); color: var(--gray-700); }
  .btn-secondary:hover { background: var(--gray-300); }
  .btn-outline { background: transparent; color: var(--navy); border: 1px solid var(--navy-light); }
  .btn-outline:hover { background: var(--blue-section-light); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid #fc8181; }
  .btn-danger:hover { background: #fff5f5; }
  .btn-success { background: var(--green); color: white; }
  .btn-success:hover { background: #2f855a; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #d4751a; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .new-workout-card {
    background: white;
    border-radius: 10px;
    border: 2px dashed var(--gray-300);
    min-height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--gray-500);
  }
  .new-workout-card:hover { border-color: var(--navy-light); color: var(--navy); background: var(--blue-section-light); }
  .new-workout-card .plus { font-size: 32px; line-height: 1; }
  .new-workout-card .label { font-size: 14px; font-weight: 600; }

  /* ===== WORKOUT BUILDER ===== */
  .builder-topbar {
    background: white;
    border-radius: 10px;
    border: 1px solid var(--gray-200);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    gap: 16px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .field-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
  .field-group label { font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }
  .field-group input, .field-group select {
    border: 1px solid var(--gray-300);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    color: var(--text);
    background: var(--gray-100);
    outline: none;
    transition: border-color 0.15s;
  }
  .field-group input:focus, .field-group select:focus { border-color: var(--navy-light); background: white; }
  .builder-actions { display: flex; gap: 8px; align-items: flex-end; }

  /* Workout Sections */
  .workout-section { margin-bottom: 16px; border-radius: 10px; overflow: hidden; border: 1px solid var(--gray-200); background: white; }
  .section-header {
    background: var(--blue-section);
    color: white;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .section-header .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
  .section-count { background: rgba(255,255,255,0.25); border-radius: 10px; padding: 1px 8px; font-size: 11px; }
  .section-toggle { font-size: 12px; color: rgba(255,255,255,0.8); }
  .section-body { padding: 0; }
  .section-body.collapsed { display: none; }

  /* Exercise Rows */
  .exercise-table { width: 100%; border-collapse: collapse; }
  .exercise-table th {
    background: var(--blue-section-light);
    color: var(--navy);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--gray-300);
  }
  .exercise-table td { padding: 8px 10px; border-bottom: 1px solid var(--gray-200); vertical-align: middle; }
  .exercise-table tr:last-child td { border-bottom: none; }
  .exercise-table tr:hover td { background: var(--gray-100); }
  .exercise-table .col-name { font-size: 13px; font-weight: 600; color: var(--navy); }
  .exercise-table .col-sub { font-size: 11px; color: var(--gray-500); }
  .ex-note-inline { font-size: 11px; color: var(--gray-500); font-style: italic; margin-top: 3px; border: none; background: transparent; width: 100%; outline: none; padding: 0; font-family: inherit; cursor: text; }
  .ex-note-inline:focus { color: var(--text); font-style: normal; }
  .ex-note-inline::placeholder { color: var(--gray-300); }
  .ex-input { border: 1px solid var(--gray-300); border-radius: 5px; padding: 5px 7px; font-size: 13px; width: 100%; min-width: 60px; background: white; outline: none; }
  .ex-input:focus { border-color: var(--navy-light); }
  .ex-remove { color: var(--gray-300); cursor: pointer; font-size: 18px; line-height: 1; }
  .ex-remove:hover { color: var(--red); }
  .add-exercise-row { padding: 10px 16px; border-top: 1px dashed var(--gray-300); }
  .btn-add-ex { background: none; border: 1px dashed var(--blue-section); color: var(--blue-section); border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
  .btn-add-ex:hover { background: var(--blue-section-light); border-style: solid; }

  /* ===== EXERCISE PICKER MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 12px;
    width: 780px;
    max-width: 95vw;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-header { background: var(--navy); color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .modal-header h3 { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 24px; cursor: pointer; line-height: 1; }
  .modal-close:hover { color: white; }
  .modal-search { padding: 14px 16px; border-bottom: 1px solid var(--gray-200); flex-shrink: 0; }
  .modal-search input { width: 100%; border: 1px solid var(--gray-300); border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; }
  .modal-search input:focus { border-color: var(--navy-light); }
  .modal-body { display: flex; flex: 1; overflow: hidden; }
  .modal-sidebar { width: 180px; border-right: 1px solid var(--gray-200); overflow-y: auto; flex-shrink: 0; padding: 8px; }
  .modal-sidebar-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--gray-700); transition: all 0.12s; }
  .modal-sidebar-item:hover { background: var(--blue-section-light); color: var(--navy); }
  .modal-sidebar-item.active { background: var(--navy); color: white; }
  .modal-list { flex: 1; overflow-y: auto; padding: 8px; }
  .modal-ex-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
  }
  .modal-ex-item:hover { background: var(--blue-section-light); border-color: var(--blue-section); }
  .modal-ex-name { font-size: 14px; font-weight: 600; color: var(--navy); }
  .modal-ex-meta { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
  .modal-ex-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .modal-phase-badge { background: var(--phase-badge); color: var(--phase-badge-text); border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: 700; }
  .no-results { text-align: center; color: var(--gray-500); padding: 40px 20px; font-size: 14px; }

  /* ===== ASSIGN WORKOUT MODAL ===== */
  .assign-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
  .assign-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border: 1px solid var(--gray-200); border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .assign-item:hover { border-color: var(--navy-light); background: var(--blue-section-light); }
  .assign-item .ai-name { font-size: 14px; font-weight: 600; color: var(--navy); }
  .assign-item .ai-meta { font-size: 12px; color: var(--gray-500); }

  /* ===== TOASTS ===== */
  #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--navy); color: white; padding: 12px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.2); animation: slideIn 0.25s ease; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ===== PRINT / PDF ===== */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body > *, #app-header, #toast-container, .modal-overlay { display: none !important; }
    #print-area { display: block !important; }
  }
  #print-area {
    display: none;
    font-family: Arial, sans-serif;
    padding: 20px;
    max-width: 800px;
    margin: 0 auto;
    font-size: 12px;
  }
  .print-header-bar {
    background: #1a3a6b !important;
    color: white !important;
    padding: 14px 18px;
    border-radius: 4px 4px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .print-header-bar h1 { font-size: 20px; font-weight: 700; }
  .print-client-info { border: 1px solid #aaa; border-top: none; }
  .print-info-row { display: flex; border-bottom: 1px solid #aaa; }
  .print-info-cell { padding: 6px 10px; flex: 1; border-right: 1px solid #aaa; font-size: 12px; }
  .print-info-cell:last-child { border-right: none; }
  .print-info-label { font-weight: 700; }
  .print-table { width: 100%; border-collapse: collapse; margin-top: 0; }
  .print-table th { background: #1a3a6b !important; color: white !important; padding: 6px 8px; text-align: center; font-size: 11px; font-weight: 700; border: 1px solid #999; }
  .print-table th.ex-col { text-align: left; }
  .print-section-row td { background: #4a7bc4 !important; color: white !important; font-weight: 700; font-size: 12px; padding: 5px 8px; border: 1px solid #999; }
  .print-table td { border: 1px solid #bbb; padding: 5px 8px; font-size: 11px; text-align: center; }
  .print-table td.ex-col { text-align: left; font-weight: 500; }
  .print-table tr.empty-row td { height: 22px; }
  .print-coaching { margin-top: 10px; font-size: 11px; border-top: 2px solid #1a3a6b; padding-top: 6px; }
  .print-coaching strong { font-size: 12px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<div id="app-header">
  <div class="logo">NASM <span>OPT</span> Builder</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('week')">📅 Week Planner</button>
    <button class="nav-tab" onclick="showView('library')">📋 Workout Library</button>
    <button class="nav-tab" id="builder-tab" onclick="showView('builder')" style="display:none">✏️ Edit Workout</button>
  </div>
</div>

<div id="app-content">

  <!-- WEEK PLANNER -->
  <div id="view-week" class="view active">
    <div class="week-header">
      <h2>Week Planner</h2>
      <div class="week-nav">
        <button class="btn-icon" onclick="changeWeek(-1)">&#8592;</button>
        <div class="week-label" id="week-label"></div>
        <button class="btn-icon" onclick="changeWeek(1)">&#8594;</button>
        <button class="btn btn-secondary btn-sm" onclick="changeWeek(0)" style="margin-left:4px">Today</button>
      </div>
    </div>
    <div class="week-grid" id="week-grid"></div>
  </div>

  <!-- WORKOUT LIBRARY -->
  <div id="view-library" class="view">
    <div class="library-header">
      <h2>Workout Library</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-secondary btn-sm" onclick="exportData()" title="Copy all workouts as text to transfer to another device">📤 Export</button>
        <button class="btn btn-secondary btn-sm" onclick="showImport()" title="Paste exported data to load workouts on this device">📥 Import</button>
        <button class="btn btn-primary" onclick="newWorkout()">+ New Workout</button>
      </div>
    </div>
    <div id="import-panel" style="display:none;background:white;border:1px solid var(--gray-300);border-radius:10px;padding:16px;margin-bottom:20px;">
      <p style="font-size:13px;color:var(--gray-700);margin-bottom:10px;">Paste exported data below and click Load:</p>
      <textarea id="import-text" rows="4" style="width:100%;border:1px solid var(--gray-300);border-radius:6px;padding:8px;font-size:12px;font-family:monospace;resize:vertical;outline:none;" placeholder="Paste your exported data here..."></textarea>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-primary btn-sm" onclick="importData()">Load Data</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('import-panel').style.display='none'">Cancel</button>
      </div>
    </div>
    <div class="workout-grid" id="workout-grid"></div>
  </div>

  <!-- WORKOUT BUILDER -->
  <div id="view-builder" class="view">
    <div class="builder-topbar">
      <div class="field-group" style="flex:2">
        <label>Client Name</label>
        <input type="text" id="b-client" placeholder="e.g. John Smith" oninput="markDirty()">
      </div>
      <div class="field-group" style="flex:2">
        <label>Goal</label>
        <select id="b-goal" onchange="markDirty(); updateGoalContext()">
          <option value="">Select Goal...</option>
          <option value="Fat Loss">Fat Loss</option>
          <option value="Muscle Gain">Muscle Gain</option>
          <option value="Sport Performance">Sport Performance</option>
        </select>
      </div>
      <div class="field-group">
        <label>OPT Phase</label>
        <select id="b-phase" onchange="markDirty(); updatePhaseContext()">
          <option value="1">Phase 1 – Stabilization Endurance</option>
          <option value="2">Phase 2 – Strength Endurance</option>
          <option value="3">Phase 3 – Muscular Development</option>
          <option value="4">Phase 4 – Maximal Strength</option>
          <option value="5">Phase 5 – Power</option>
        </select>
      </div>
      <div class="field-group">
        <label>Date</label>
        <input type="date" id="b-date" oninput="markDirty()">
      </div>
      <div class="field-group" style="flex:2">
        <label>Setting / Equipment</label>
        <select id="b-setting" onchange="markDirty(); updateSettingContext()">
          <option value="Full Gym">🏋️ Full Gym</option>
          <option value="Apartment (DB + Pull-up Bar)">🏠 Apartment (DB + Pull-up Bar)</option>
          <option value="Home (DB + Pull-up Bar)">🏡 Home (DB + Pull-up Bar)</option>
          <option value="Bodyweight Only">🤸 Bodyweight Only</option>
          <option value="Outdoors">🌳 Outdoors</option>
        </select>
      </div>
      <div class="builder-actions">

// Returns {ok, reason} for whether an exercise can be done under a given setting name.
function checkExerciseSetting(ex, settingName) {
  const cfg = SETTINGS[settingName] || SETTINGS['Full Gym'];
  if (cfg.equip !== 'ALL') {
    const missing = (ex.equipment || []).filter(e => !cfg.equip.includes(e));
    if (missing.length) return { ok:false, reason:'Needs ' + missing.map(m => EQUIP_LABELS[m] || m).join(' + ') };
  }
  if (ex.impact === 'high' && !cfg.allowImpact) return { ok:false, reason:'No jumping/impact here' };
  return { ok:true, reason:'' };
}
function currentSetting() {
  const el = document.getElementById('b-setting');

// ===== STORAGE =====
function saveState() {
  try { localStorage.setItem('nasm_opt_v1', JSON.stringify({ workouts: state.workouts, weekPlans: state.weekPlans })); } catch(e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem('nasm_opt_v1');
    if (raw) { const s = JSON.parse(raw); state.workouts = s.workouts||{}; state.weekPlans = s.weekPlans||{}; }
  } catch(e) {}
}
function generateId() { return 'w_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

// ===== WEEK UTILITIES =====
function getWeekKey(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset * 7);
  const y = d.getFullYear(); const s = new Date(y,0,1);
  const w = Math.ceil(((d-s)/86400000 + s.getDay()+1)/7);
  return `${y}-W${String(w).padStart(2,'0')}`;
}
function getWeekDates(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset*7);
  const day = d.getDay(); d.setDate(d.getDate() + (day===0?-6:1-day));
  return ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((label,i) => {
    const dd = new Date(d); dd.setDate(d.getDate()+i); return { label, date: dd, key: label };
  });
}
function getWeekLabel(offset) {
  const days = getWeekDates(offset);
  const fmt = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${fmt(days[0].date)} – ${fmt(days[6].date)}, ${days[0].date.getFullYear()}`;
}

// ===== VIEW ROUTER =====
function showView(v) {
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(el=>{
    if(el.getAttribute('onclick')&&el.getAttribute('onclick').includes("'"+v+"'")) el.classList.add('active');
  });
  if(v==='week') renderWeek();
  if(v==='library') renderLibrary();
  if(v==='builder') renderBuilder();
}

// ===== WEEK PLANNER =====
function changeWeek(dir) {
  if(dir===0) state.currentWeekOffset=0; else state.currentWeekOffset+=dir;
  renderWeek();
}
function renderWeek() {
  document.getElementById('week-label').textContent = getWeekLabel(state.currentWeekOffset);
  const weekKey = getWeekKey(state.currentWeekOffset);
  const days = getWeekDates(state.currentWeekOffset);
  const plan = state.weekPlans[weekKey]||{};
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  days.forEach(({label,date,key}) => {
    const assigned = plan[key]||[];
    const isToday = date.toDateString()===new Date().toDateString();
    const card = document.createElement('div');
    card.className = 'day-card'+(assigned.length>0?' has-workout':'');
    card.innerHTML = `
      <div class="day-header" ${isToday?'style="background:#f0a040"':''}>
        <span>${label}</span><span class="date-num">${date.getDate()}</span>
      </div>
      <div class="day-body">
        ${assigned.map(wid=>{
          const w=state.workouts[wid]; if(!w) return '';
          return `<div class="day-workout-pill" onclick="openWorkoutFromDay('${wid}')">
            <span class="pill-name">${w.name||'Unnamed'}</span>
            <span class="pill-phase">Ph ${w.phase}</span>
            <span class="pill-remove" onclick="event.stopPropagation();removeFromDay('${weekKey}','${key}','${wid}')">&#x2715;</span>
          </div>`;
        }).join('')}
        ${assigned.length===0?'<div class="day-rest">Rest Day</div>':''}
        <div class="day-add-btn" onclick="openAssignModal('${weekKey}','${key}')">+ Add Workout</div>
      </div>`;
    grid.appendChild(card);
  });
}
function openWorkoutFromDay(wid) {
  state.currentWorkoutId=wid;
  document.getElementById('builder-tab').style.display='inline-flex';
  showView('builder');
}
function removeFromDay(weekKey,dayKey,wid) {
  if(!state.weekPlans[weekKey]) return;
  state.weekPlans[weekKey][dayKey]=(state.weekPlans[weekKey][dayKey]||[]).filter(id=>id!==wid);
  saveState(); renderWeek();
}

// ===== ASSIGN MODAL =====
function openAssignModal(weekKey,dayKey) {
  assignState={weekKey,dayKey};
  const list=document.getElementById('assign-list');
  const workouts=Object.values(state.workouts).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  if(workouts.length===0) {
    list.innerHTML='<div class="no-results" style="padding:30px">No saved workouts yet.<br><br><button class="btn btn-primary" onclick="closeAssign();newWorkout()">+ Create New Workout</button></div>';
  } else {
    list.innerHTML=workouts.map(w=>`
      <div class="assign-item" onclick="assignWorkout('${w.id}')">
        <div><div class="ai-name">${w.name||'Unnamed Workout'}</div>
        <div class="ai-meta">Phase ${w.phase} · ${w.goal||'No goal'} · ${w.date||'No date'}</div></div>
        <span class="pill-phase">Ph ${w.phase}</span>
      </div>`).join('');
  }
  document.getElementById('assign-title').textContent=`Assign to ${dayKey}`;
  document.getElementById('assign-modal').classList.add('open');
}
function closeAssign() { document.getElementById('assign-modal').classList.remove('open'); }
function assignWorkout(wid) {
  const {weekKey,dayKey}=assignState;
  if(!state.weekPlans[weekKey]) state.weekPlans[weekKey]={};
  if(!state.weekPlans[weekKey][dayKey]) state.weekPlans[weekKey][dayKey]=[];
  if(!state.weekPlans[weekKey][dayKey].includes(wid)) state.weekPlans[weekKey][dayKey].push(wid);
  saveState(); closeAssign(); renderWeek(); toast('Workout assigned!');
}

// ===== WORKOUT LIBRARY =====
function renderLibrary() {
  const grid=document.getElementById('workout-grid');

      const short=s.replace('Activation (Core & Balance)','Activation').replace('Skill Development (Plyometric & SAQ)','Skill Dev').replace("Client's Choice","Client's Choice");

function newWorkout() {
  const id=generateId();
  const today=new Date().toISOString().slice(0,10);
  state.workouts[id]={ id, name:'New Workout', client:'', goal:'', phase:1, date:today, setting:'Full Gym',
    exercises:{warmup:[],activation:[],skilldevelopment:[],resistance:[],clientschoice:[],cooldown:[]},
    coaching:'', createdAt:Date.now(), updatedAt:Date.now() };

function editWorkout(id) {
  state.currentWorkoutId=id;
  document.getElementById('builder-tab').style.display='inline-flex';
  showView('builder');
}
function duplicateWorkout(id) {
  const orig=state.workouts[id]; if(!orig) return;
  const newId=generateId();
  const copy=JSON.parse(JSON.stringify(orig));
  copy.id=newId; copy.name='Copy of '+orig.name; copy.createdAt=copy.updatedAt=Date.now();
  state.workouts[newId]=copy; saveState(); renderLibrary(); toast('Workout duplicated!');
}
function deleteWorkout(id) {
  if(!confirm('Delete this workout?')) return;
  delete state.workouts[id];
  Object.values(state.weekPlans).forEach(plan=>{ Object.keys(plan).forEach(day=>{ plan[day]=plan[day].filter(wid=>wid!==id); }); });

function updatePhaseContext() {

  const phaseText=PHASE_CONTEXT[phase]||'';

function updateSettingContext() {
  const name=document.getElementById('b-setting').value||'Full Gym';
  const cfg=SETTINGS[name]||SETTINGS['Full Gym'];
  const banner=document.getElementById('setting-context');
  if(name==='Full Gym'){ banner.style.display='none'; }
  else {
    banner.style.display='block';
    banner.innerHTML=`<strong>${cfg.icon} ${name}:</strong> ${cfg.note} &nbsp;Exercises you can't do here are dimmed with a <strong>⚠ Swap</strong> button.`;
  }
  renderSections();
}
function updateGoalContext() {
  const goal=document.getElementById('b-goal').value;
  const phaseSelect=document.getElementById('b-phase');
  // Phase restrictions per goal
  const GOAL_PHASES={
    'Fat Loss':          [1,2,3],
    'Muscle Gain':       [1,2,3,4],
    'Sport Performance': [1,2,5],
  };
  const allowed=GOAL_PHASES[goal]||[1,2,3,4,5];
  Array.from(phaseSelect.options).forEach(opt=>{
    const ph=parseInt(opt.value);
    opt.disabled=!allowed.includes(ph);
    opt.style.color=opt.disabled?'#bbb':'';
    opt.title=opt.disabled?`Phase ${ph} is not part of the ${goal} progression`:'';
  });
  // If current phase is now disallowed, jump to first valid one
  if(!allowed.includes(parseInt(phaseSelect.value))) {
    phaseSelect.value=String(allowed[0]);
  }
  updatePhaseContext();
}
function renderSections() {
  const w=getWorkout();
  const phase=parseInt(document.getElementById('b-phase').value);
  const container=document.getElementById('workout-sections');
  container.innerHTML='';
  SECTIONS.forEach(sec=>{

    const div=document.createElement('div');

    const setting=currentSetting();
    const tableRows=exercises.map((ex,i)=>{
      const lib=EXERCISE_LIBRARY.find(e=>e.id===ex.id);
      const chk=lib?checkExerciseSetting(lib,setting):{ok:true,reason:''};
      const warnRow=chk.ok?'':`<div style="margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="background:#fff0e0;color:#b35900;border:1px solid #f0c088;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700">⚠ ${esc(chk.reason)}</span>
          <button class="btn btn-accent btn-sm" style="padding:2px 10px;font-size:11px" onclick="openPicker('${sec.id}',${i},'${esc((lib&&lib.muscles)||ex.muscles||'')}')">🔁 Swap</button>
        </div>`;
      return `<tr ${chk.ok?'':'style="background:#fffaf2"'}>
      <td style="width:28px"><span style="color:var(--gray-300);cursor:grab;font-size:16px;padding:0 4px">&#8597;</span></td>
      <td>
        <div class="col-name">${esc(ex.name)}</div>
        ${ex.muscles?`<div class="col-sub">${esc(ex.muscles)}</div>`:''}
        ${warnRow}
        <input class="ex-note-inline" value="${esc(ex.notes||'')}" placeholder="Add a note or cue..." oninput="updateExercise('${sec.id}',${i},'notes',this.value)" title="Notes">
      </td>
      <td><input class="ex-input" style="width:60px${ex.sets&&ex.sets!==defaults.sets?';border-color:var(--navy-light);background:#f0f4ff':''}" value="${esc(ex.sets||'')}" placeholder="${esc(defaults.sets||'')}" oninput="updateExercise('${sec.id}',${i},'sets',this.value)" title="${ex.sets&&ex.sets!==defaults.sets?'Custom value (phase default: '+esc(defaults.sets||'')+')':`Phase ${phase} default`}"></td>
      <td><input class="ex-input" style="width:60px${ex.reps&&ex.reps!==defaults.reps?';border-color:var(--navy-light);background:#f0f4ff':''}" value="${esc(ex.reps||'')}" placeholder="${esc(defaults.reps||'')}" oninput="updateExercise('${sec.id}',${i},'reps',this.value)" title="${ex.reps&&ex.reps!==defaults.reps?'Custom value (phase default: '+esc(defaults.reps||'')+')':`Phase ${phase} default`}"></td>
      <td><input class="ex-input" style="width:80px${ex.tempo&&ex.tempo!==defaults.tempo?';border-color:var(--navy-light);background:#f0f4ff':''}" value="${esc(ex.tempo||'')}" placeholder="${esc(defaults.tempo||'')}" oninput="updateExercise('${sec.id}',${i},'tempo',this.value)" title="${ex.tempo&&ex.tempo!==defaults.tempo?'Custom value (phase default: '+esc(defaults.tempo||'')+')':`Phase ${phase} default`}"></td>
      <td><input class="ex-input" style="width:70px${ex.rest&&ex.rest!==defaults.rest?';border-color:var(--navy-light);background:#f0f4ff':''}" value="${esc(ex.rest||'')}" placeholder="${esc(defaults.rest||'')}" oninput="updateExercise('${sec.id}',${i},'rest',this.value)" title="${ex.rest&&ex.rest!==defaults.rest?'Custom value (phase default: '+esc(defaults.rest||'')+')':`Phase ${phase} default`}"></td>
      <td style="width:28px"><span class="ex-remove" onclick="removeExercise('${sec.id}',${i})">&#x2715;</span></td>
    </tr>`;
    }).join('');
    div.innerHTML=`
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <span class="section-title">${sec.label}<span class="section-count">${exercises.length}</span></span>
        <div style="display:flex;align-items:center;gap:8px">
          ${exercises.length>0?`<button class="btn btn-sm" style="background:rgba(255,255,255,0.18);color:white;border:1px solid rgba(255,255,255,0.35);font-size:11px;padding:3px 9px" onclick="event.stopPropagation();resetSectionDefaults('${sec.id}')">↺ Reset Defaults</button>`:''}
          <span class="section-toggle" id="toggle-${sec.id}">&#9660;</span>
        </div>
      </div>
      <div class="section-body" id="body-${sec.id}">
        ${exercises.length>0?`<table class="exercise-table">
          <thead><tr><th style="width:28px"></th><th>Exercise / Notes</th><th style="width:70px">Sets</th><th style="width:70px">Reps</th><th style="width:90px">Tempo</th><th style="width:80px">Rest</th><th style="width:28px"></th></tr></thead>
          <tbody>${tableRows}</tbody></table>`:''}
        <div class="add-exercise-row"><button class="btn-add-ex" onclick="openPicker('${sec.id}')">+ Add Exercise</button></div>
      </div>`;
    container.appendChild(div);
  });
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toggleSection(id) {
  const body=document.getElementById('body-'+id), toggle=document.getElementById('toggle-'+id);
  body.classList.toggle('collapsed'); toggle.textContent=body.classList.contains('collapsed')?'▶':'▼';
}
function updateExercise(sectionId,idx,field,value) {
  const w=getWorkout(); if(!w||!w.exercises[sectionId]||!w.exercises[sectionId][idx]) return;
  w.exercises[sectionId][idx][field]=value; w.updatedAt=Date.now();
}
function removeExercise(sectionId,idx) {
  const w=getWorkout(); if(!w) return;
  w.exercises[sectionId].splice(idx,1); w.updatedAt=Date.now(); renderSections();
}
function saveWorkout() {
  syncWorkoutHeader(); const w=getWorkout(); if(!w) return;
  saveState(); renderSections(); toast('Workout saved!');
}
function resetSectionDefaults(sectionId) {
  const w=getWorkout(); if(!w) return;
  const phase=parseInt(document.getElementById('b-phase').value);
  const defaults=PHASE_DEFAULTS[phase][sectionId]||{};
  (w.exercises[sectionId]||[]).forEach(ex=>{
    ex.sets=defaults.sets||''; ex.reps=defaults.reps||'';
    ex.tempo=defaults.tempo||''; ex.rest=defaults.rest||'';
  });
  w.updatedAt=Date.now(); saveState(); renderSections();
  toast('Reset to Phase '+phase+' defaults');
}

// ===== EXERCISE PICKER =====
function openPicker(sectionId, swapIdx=null, swapMuscles='') {
  pickerState={sectionId, activeSub:null, searchTerm:'', swapIdx, swapMuscles:swapMuscles||''};
  document.getElementById('picker-search').value='';
  const secLabel=SECTIONS.find(s=>s.id===sectionId)?.label||sectionId;
  document.getElementById('picker-title').textContent=
    (swapIdx!==null&&swapIdx!==undefined) ? `🔁 Swap Exercise — find a replacement` : `Add Exercise — ${secLabel}`;
  renderPickerSidebar(sectionId); renderPickerList(sectionId);
  document.getElementById('exercise-picker-modal').classList.add('open');
  setTimeout(()=>document.getElementById('picker-search').focus(),100);
}
function closePicker() { document.getElementById('exercise-picker-modal').classList.remove('open'); }
function renderPickerSidebar(sectionId) {
  const subs=[...new Set(EXERCISE_LIBRARY.filter(e=>e.section===sectionId).map(e=>e.sub))];
  document.getElementById('picker-sidebar').innerHTML=
    `<div class="modal-sidebar-item ${!pickerState.activeSub?'active':''}" onclick="setPickerSub(null)">All Exercises</div>`+
    subs.map(sub=>`<div class="modal-sidebar-item ${pickerState.activeSub===sub?'active':''}" onclick='setPickerSubStr(${JSON.stringify(sub)})'>${esc(sub)}</div>`).join('');
}
function setPickerSub(sub) { pickerState.activeSub=sub; renderPickerSidebar(pickerState.sectionId); renderPickerList(pickerState.sectionId); }
function setPickerSubStr(sub) { setPickerSub(sub); }
function filterExercises() { pickerState.searchTerm=document.getElementById('picker-search').value.toLowerCase(); renderPickerList(pickerState.sectionId); }
function renderPickerList(sectionId) {
  const phase=parseInt(document.getElementById('b-phase').value);
  const term=pickerState.searchTerm, sub=pickerState.activeSub;
  let exercises=EXERCISE_LIBRARY.filter(e=>e.section===sectionId);
  if(sub&&!term) exercises=exercises.filter(e=>e.sub===sub);
  if(term) exercises=exercises.filter(e=>e.name.toLowerCase().includes(term)||(e.muscles||'').toLowerCase().includes(term)||(e.sub||'').toLowerCase().includes(term));
  const setting=currentSetting();
  // In swap mode, prioritise exercises sharing a muscle word with the one being replaced.
  const swapWords=(pickerState.swapMuscles||'').toLowerCase().split(/[,\s]+/).filter(x=>x.length>2);
  const muscleScore=ex=>{ if(!swapWords.length) return 0; const m=(ex.muscles||'').toLowerCase(); return swapWords.some(w=>m.includes(w))?1:0; };
  const score=ex=>{
    const doable=checkExerciseSetting(ex,setting).ok?1:0;
    const phaseM=ex.phases.includes(phase)?1:0;
    return doable*100 + muscleScore(ex)*10 + phaseM;
  };
  exercises.sort((a,b)=>score(b)-score(a));
  const list=document.getElementById('picker-list');
  if(!exercises.length){ list.innerHTML='<div class="no-results">No exercises found.</div>'; return; }
  list.innerHTML=exercises.map(ex=>{
    const match=ex.phases.includes(phase);
    const chk=checkExerciseSetting(ex,setting);
    const phaseBadge=match?`<span class="modal-phase-badge">&#10003; Phase ${phase}</span>`:`<span style="color:var(--gray-500);font-size:11px">Ph ${ex.phases.join(',')}</span>`;
    const equipBadge=chk.ok?'':`<span style="background:#fff0e0;color:#b35900;border:1px solid #f0c088;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">⚠ ${esc(chk.reason)}</span>`;
    return `<div class="modal-ex-item" style="${chk.ok?'':'opacity:0.55'}" onclick="addExercise('${ex.id}')">
      <div><div class="modal-ex-name">${esc(ex.name)}</div><div class="modal-ex-meta">${esc(ex.sub)}${ex.muscles?' · '+esc(ex.muscles):''}</div></div>
      <div class="modal-ex-right">${equipBadge}${phaseBadge}</div>
    </div>`;
  }).join('');
}
function addExercise(exId) {
  const ex=EXERCISE_LIBRARY.find(e=>e.id===exId); if(!ex) return;
  const w=getWorkout(); if(!w) return;
  const sectionId=pickerState.sectionId;
  const phase=parseInt(document.getElementById('b-phase').value);
  const defaults=PHASE_DEFAULTS[phase][sectionId]||{};
  const swapIdx=pickerState.swapIdx;
  if(swapIdx!==null&&swapIdx!==undefined&&w.exercises[sectionId][swapIdx]){
    // Preserve the trainer's existing sets/reps/tempo/rest; swap the movement + muscles + default note.
    const prev=w.exercises[sectionId][swapIdx];
    w.exercises[sectionId][swapIdx]={ id:exId, name:ex.name, muscles:ex.muscles||'',
      sets:prev.sets||defaults.sets||'', reps:prev.reps||defaults.reps||'',
      tempo:prev.tempo||defaults.tempo||'', rest:prev.rest||defaults.rest||'', notes:ex.notes||'' };
    w.updatedAt=Date.now(); syncWorkoutHeader(); renderSections(); closePicker(); toast('Swapped in: '+ex.name);
    return;
  }
  w.exercises[sectionId].push({ id:exId, name:ex.name, muscles:ex.muscles||'', sets:defaults.sets||'', reps:defaults.reps||'', tempo:defaults.tempo||'', rest:defaults.rest||'', notes:ex.notes||'' });
  w.updatedAt=Date.now(); syncWorkoutHeader(); renderSections(); closePicker(); toast('Added: '+ex.name);
}

// ===== PDF EXPORT =====
function printWorkout() {
  syncWorkoutHeader(); const w=getWorkout(); if(!w) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'pt', format:'letter' });
  const PW = doc.internal.pageSize.getWidth();
  const NAVY=[26,58,107], BLUE=[74,123,196], BLUE_LIGHT=[214,228,247], WHITE=[255,255,255], GRAY=[74,85,104];
  const PHASE_LABELS={1:'Phase 1 – Stabilization Endurance',2:'Phase 2 – Strength Endurance',3:'Phase 3 – Muscular Development',4:'Phase 4 – Maximal Strength',5:'Phase 5 – Power Training'};

  // Header bar
  doc.setFillColor(...NAVY);
  doc.rect(0,0,PW,48,'F');
  doc.setTextColor(...WHITE);
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text('Optimum Performance Training®', 36, 30);
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text('NASM', PW-36, 30, {align:'right'});

  // Client info grid
  const infoY=48;
  const infoH=22;
  const cols=[[36,'CLIENT\'S NAME',w.client||''],[PW/2,'GOAL',w.goal||'']];
  const cols2=[[36,'PHASE',PHASE_LABELS[w.phase]||'Phase '+w.phase],[PW/2,'DATE',w.date||'']];
  [[cols,infoY],[cols2,infoY+infoH]].forEach(([row,y])=>{
    doc.setDrawColor(170,170,170);
    doc.setFillColor(...WHITE);
    doc.rect(36,y,PW-72,infoH,'FD');
    doc.line(PW/2,y,PW/2,y+infoH);
    row.forEach(([x,label,val])=>{
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(...GRAY);
      doc.text(label+': ', x+6, y+14);
      const lw=doc.getTextWidth(label+': ');
      doc.setFont('helvetica','normal'); doc.setTextColor(...[26,32,44]);
      doc.text(val, x+6+lw, y+14);
    });
  });

  // Exercise table
  const body=[];
  SECTIONS.forEach(sec=>{
    body.push([{content:sec.label, colSpan:6, styles:{fillColor:BLUE, textColor:WHITE, fontStyle:'bold', fontSize:9}}]);
    const exs=w.exercises[sec.id]||[];
    if(exs.length===0){
      body.push([{content:'', colSpan:6, styles:{minCellHeight:16}}]);
    } else {
      exs.forEach(ex=>{
        body.push([ex.name+(ex.notes?'\n'+ex.notes:''), ex.sets||'', ex.reps||'', ex.tempo||'', ex.rest||'', '']);
      });
    }
  });

  doc.autoTable({
    startY: infoY + infoH*2 + 8,
    margin:{left:36,right:36},
    head:[[
      {content:'EXERCISE', styles:{halign:'left'}},
      'SETS','REPS','TEMPO','REST',
      {content:'NOTES', styles:{halign:'left'}},
    ]],
    body,
    styles:{fontSize:8, cellPadding:4, lineColor:[200,200,200], lineWidth:0.5},
    headStyles:{fillColor:NAVY, textColor:WHITE, fontStyle:'bold', fontSize:8},
    columnStyles:{
      0:{cellWidth:155, halign:'left'},
      1:{cellWidth:38, halign:'center'},
      2:{cellWidth:38, halign:'center'},
      3:{cellWidth:65, halign:'center'},
      4:{cellWidth:55, halign:'center'},
      5:{halign:'left'},
    },
    alternateRowStyles:{fillColor:[249,251,253]},
  });

  // Coaching tips
  if(w.coaching){
    const finalY=doc.lastAutoTable.finalY+10;
    doc.setDrawColor(...NAVY); doc.setLineWidth(1.5);
    doc.line(36,finalY,PW-36,finalY);
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...NAVY);
    doc.text('Coaching Tips:', 36, finalY+14);
    doc.setFont('helvetica','normal'); doc.setTextColor(...GRAY);
    const lines=doc.splitTextToSize(w.coaching, PW-100);
    doc.text(lines, 120, finalY+14);
  }

  const filename=(w.name||'workout').replace(/[^a-z0-9]/gi,'_').toLowerCase()+'.pdf';
  doc.save(filename);
  toast('PDF downloaded!');
}

// ===== EXPORT / IMPORT =====
function exportData() {
  const data = JSON.stringify({ workouts: state.workouts, weekPlans: state.weekPlans });
  navigator.clipboard.writeText(data).then(() => {
    toast('Copied to clipboard! Paste it into the app on your other device.');
  }).catch(() => {
    // Fallback: show in a prompt
    const w = window.open('', '_blank', 'width=600,height=400');
    w.document.write('<textarea style="width:100%;height:90%;font-size:11px;font-family:monospace">' + data.replace(/</g,'&lt;') + '</textarea>');
    toast('Copy all the text from the new window, then paste it on your other device.');
  });
}
function showImport() {
  const panel = document.getElementById('import-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  if (panel.style.display === 'block') document.getElementById('import-text').focus();
}
function importData() {
  try {
    const raw = document.getElementById('import-text').value.trim();
    const parsed = JSON.parse(raw);
    if (!parsed.workouts) throw new Error('Invalid format');
    state.workouts = { ...state.workouts, ...parsed.workouts };
    if (parsed.weekPlans) {
      Object.keys(parsed.weekPlans).forEach(wk => {
        if (!state.weekPlans[wk]) state.weekPlans[wk] = {};
        Object.keys(parsed.weekPlans[wk]).forEach(day => {
          state.weekPlans[wk][day] = [...new Set([...(state.weekPlans[wk][day]||[]), ...parsed.weekPlans[wk][day]])];
        });
      });
    }
    saveState(); renderLibrary();
    document.getElementById('import-panel').style.display = 'none';
    document.getElementById('import-text').value = '';
    toast('Data imported! ' + Object.keys(parsed.workouts).length + ' workouts loaded.');
  } catch(e) {
    toast('Import failed — make sure you pasted the full exported text.');
  }
}

// ===== TOAST =====
function toast(msg) {
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

// ===== CLOSE ON OVERLAY CLICK =====
document.getElementById('exercise-picker-modal').addEventListener('click',function(e){if(e.target===this)closePicker();});
document.getElementById('assign-modal').addEventListener('click',function(e){if(e.target===this)closeAssign();});
